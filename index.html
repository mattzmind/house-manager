<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="House">
<meta name="theme-color" content="#fafaf9">
<title>House</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:wght@500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --bg:#fafaf9; --surface:#ffffff; --surface2:#f5f5f4; --surface3:#e7e5e4;
  --border:#e7e5e4; --divider:#f5f5f4;
  --text:#0c0a09; --muted:#78716c; --subtle:#a8a29e;
  --accent:#16a34a; --accent-soft:#dcfce7; --accent-text:#15803d;
  --warn:#d97706; --warn-soft:#fef3c7; --warn-text:#b45309;
  --shadow:0 1px 2px rgba(0,0,0,.04), 0 1px 1px rgba(0,0,0,.03);
  --radius:14px; --radius-sm:10px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0c0a09; --surface:#1c1917; --surface2:#292524; --surface3:#44403c;
    --border:#292524; --divider:#1c1917;
    --text:#fafaf9; --muted:#a8a29e; --subtle:#78716c;
    --accent:#22c55e; --accent-soft:#14532d; --accent-text:#86efac;
    --warn:#f59e0b; --warn-soft:#451a03; --warn-text:#fbbf24;
    --shadow:0 1px 2px rgba(0,0,0,.3);
  }
  html{color-scheme:dark}
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,system-ui,sans-serif;font-size:16px;line-height:1.5}
body{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:calc(80px + env(safe-area-inset-bottom));position:relative;overflow-x:hidden}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;background:none;border:none;outline:none}
button{cursor:pointer}
input::placeholder{color:var(--subtle)}

/* ─── HEADER (subtle) ─── */
.app-header{padding:calc(env(safe-area-inset-top) + 14px) 20px 8px;display:flex;align-items:center;justify-content:space-between}
.greeting{font-size:13px;color:var(–muted);font-weight:500;letter-spacing:.02em;text-transform:uppercase}
.header-action{font-size:14px;color:var(–accent);font-weight:600}

/* ─── TODAY HERO ─── */
.hero{padding:8px 20px 20px}
.hero-title{font-family:‘Fraunces’,serif;font-size:34px;font-weight:600;letter-spacing:-.02em;line-height:1.05}
.hero-sub{font-size:15px;color:var(–muted);margin-top:6px}
.hero-progress{margin-top:18px;background:var(–surface);border-radius:var(–radius);padding:18px 20px;border:1px solid var(–border)}
.hp-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.hp-numbers{display:flex;align-items:baseline;gap:4px}
.hp-done{font-family:‘Fraunces’,serif;font-size:36px;font-weight:600;letter-spacing:-.03em;line-height:1}
.hp-total{font-size:18px;color:var(–muted);font-weight:500}
.hp-label{font-size:13px;color:var(–muted);font-weight:500}
.hp-streak{display:flex;align-items:center;gap:5px;font-size:13px;color:var(–warn-text);font-weight:600}
.hp-bar{height:6px;background:var(–surface2);border-radius:99px;overflow:hidden}
.hp-fill{height:100%;background:var(–accent);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ─── SECTION ─── */
.section{padding:0 20px;margin-top:24px}
.section-title{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
.section-title h2{font-size:13px;font-weight:600;color:var(–muted);text-transform:uppercase;letter-spacing:.06em}
.section-title .st-count{font-size:13px;color:var(–subtle);font-weight:500}
.section-title button{font-size:13px;color:var(–accent);font-weight:600}

/* ─── CATCHUP CARD ─── */
.catchup{background:var(–warn-soft);border-radius:var(–radius);padding:16px 18px;margin:0 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border:1px solid color-mix(in srgb,var(–warn) 20%,transparent)}
.catchup-text{flex:1}
.catchup-title{font-size:15px;font-weight:600;color:var(–warn-text)}
.catchup-sub{font-size:13px;color:var(–warn-text);opacity:.8;margin-top:2px}
.catchup-arrow{font-size:20px;color:var(–warn-text);transition:transform .2s}
.catchup-arrow.open{transform:rotate(90deg)}

/* ─── TASK CARD ─── */
.task-list{display:flex;flex-direction:column;gap:6px;padding:0 20px}
.task{position:relative;background:var(–surface);border-radius:var(–radius);border:1px solid var(–border);overflow:hidden;transition:all .25s cubic-bezier(.4,0,.2,1)}
.task.done{opacity:.5}
.task-row{display:flex;align-items:center;gap:14px;padding:14px 16px;position:relative;z-index:2;background:var(–surface);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.task.done .task-row{background:var(–surface2)}
.task-check{width:26px;height:26px;border-radius:8px;border:2px solid var(–surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;transition:all .15s;background:var(–surface)}
.task-check.checked{border-color:var(–accent);background:var(–accent)}
.task-content{flex:1;min-width:0}
.task-name{font-size:16px;font-weight:500;color:var(–text);line-height:1.3}
.task.done .task-name{text-decoration:line-through;color:var(–muted)}
.task-meta{display:flex;align-items:center;gap:8px;margin-top:3px;font-size:13px;color:var(–muted)}
.task-freq{display:inline-block;font-size:11px;font-weight:600;color:var(–muted);text-transform:uppercase;letter-spacing:.04em}
.task-skip{padding:6px 10px;border-radius:8px;font-size:13px;color:var(–muted);font-weight:500;background:var(–surface2)}
.task-skip:active{background:var(–surface3)}

/* ─── EMPTY STATES ─── */
.empty-state{text-align:center;padding:40px 20px;color:var(–muted)}
.empty-emoji{font-size:40px;margin-bottom:8px;display:block}
.empty-title{font-family:‘Fraunces’,serif;font-size:22px;font-weight:600;color:var(–text);margin-bottom:4px}
.empty-sub{font-size:14px;color:var(–muted)}

/* ─── BOTTOM NAV ─── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(–surface);border-top:1px solid var(–border);display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100;backdrop-filter:blur(20px);max-width:520px;margin:0 auto}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;color:var(–subtle);transition:color .15s}
.nav-btn.active{color:var(–text)}
.nav-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.nav-label{font-size:11px;font-weight:600;letter-spacing:.02em}

/* ─── PLAN VIEW (calendar) ─── */
.plan-header{padding:calc(env(safe-area-inset-top) + 14px) 20px 16px}
.plan-title{font-family:‘Fraunces’,serif;font-size:28px;font-weight:600;letter-spacing:-.02em}
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px 16px}
.week-label{font-size:15px;font-weight:600;color:var(–text)}
.week-arrows{display:flex;gap:4px;align-items:center}
.week-btn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(–muted);background:var(–surface);border:1px solid var(–border)}
.week-btn:disabled{opacity:.3}
.week-today{font-size:13px;color:var(–accent);font-weight:600;padding:6px 12px;background:var(–accent-soft);border-radius:8px;margin-right:6px}
.day-card{margin:0 20px 8px;background:var(–surface);border-radius:var(–radius);border:1px solid var(–border);overflow:hidden}
.day-card.today{border-color:var(–accent);background:color-mix(in srgb,var(–accent-soft) 50%,var(–surface))}
.day-card.past{opacity:.55}
.day-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer}
.day-head-left{display:flex;align-items:center;gap:10px}
.today-dot{width:8px;height:8px;border-radius:50%;background:var(–accent)}
.day-name{font-size:16px;font-weight:600}
.day-date{font-size:13px;color:var(–muted);margin-top:1px}
.day-count{font-size:13px;color:var(–muted);font-weight:500;display:flex;align-items:center;gap:6px}
.day-arrow{font-size:14px;color:var(–subtle);transition:transform .2s}
.day-arrow.open{transform:rotate(90deg)}
.day-tasks{border-top:1px solid var(–divider)}
.day-task{display:flex;align-items:center;gap:10px;padding:12px 16px;border-top:1px solid var(–divider)}
.day-task:first-child{border-top:none}
.day-task-dot{width:6px;height:6px;border-radius:50%;background:var(–subtle);flex-shrink:0}
.day-task-dot.daily{background:var(–accent)}
.day-task-dot.weekly{background:#3b82f6}
.day-task-dot.other{background:var(–warn)}
.day-task-name{flex:1;font-size:15px}
.day-task-freq{font-size:11px;font-weight:600;color:var(–muted);text-transform:uppercase;letter-spacing:.04em}
.day-task-edit{padding:4px 8px;color:var(–subtle);font-size:14px}
.reschedule-panel{background:var(–surface2);padding:14px 16px;border-top:1px solid var(–divider)}
.rp-title{font-size:13px;font-weight:600;color:var(–muted);margin-bottom:10px}
.day-pills{display:flex;gap:6px;flex-wrap:wrap}
.day-pill{padding:8px 12px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(–border);background:var(–surface);color:var(–text)}
.day-pill.on{background:var(–text);color:var(–surface);border-color:var(–text)}
.rp-actions{display:flex;gap:8px;margin-top:12px}
.btn-primary{padding:10px 18px;border-radius:10px;background:var(–text);color:var(–surface);font-size:14px;font-weight:600;flex:1}
.btn-secondary{padding:10px 18px;border-radius:10px;background:var(–surface);color:var(–muted);font-size:14px;font-weight:500;border:1px solid var(–border)}
.day-empty{padding:14px 16px;font-size:14px;color:var(–muted);font-style:italic}

/* ─── SETUP VIEW ─── */
.setup-list{padding:0 20px}
.setup-item{display:flex;align-items:center;gap:14px;padding:18px 18px;background:var(–surface);border-radius:var(–radius);border:1px solid var(–border);margin-bottom:8px;cursor:pointer}
.setup-icon{width:40px;height:40px;border-radius:10px;background:var(–surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.setup-content{flex:1}
.setup-title{font-size:16px;font-weight:600;color:var(–text)}
.setup-sub{font-size:13px;color:var(–muted);margin-top:2px}
.setup-arrow{color:var(–subtle);font-size:18px}

/* ─── DETAIL VIEWS (chores/projects/seasonal lists) ─── */
.detail-header{padding:calc(env(safe-area-inset-top) + 14px) 20px 8px;display:flex;align-items:center;gap:10px}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(–surface);border:1px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(–text)}
.detail-title{font-family:‘Fraunces’,serif;font-size:24px;font-weight:600;flex:1}
.add-btn{width:36px;height:36px;border-radius:50%;background:var(–text);color:var(–surface);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:300}

/* ─── MODAL / SHEET ─── */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;animation:fadeIn .2s ease}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(–surface);border-radius:24px 24px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom));z-index:201;max-width:520px;margin:0 auto;max-height:90vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.4,0,.2,1)}
.sheet-handle{width:40px;height:4px;background:var(–surface3);border-radius:99px;margin:0 auto 18px}
.sheet-title{font-family:‘Fraunces’,serif;font-size:22px;font-weight:600;margin-bottom:18px}
.sheet-field{margin-bottom:16px}
.field-label{font-size:13px;font-weight:600;color:var(–muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.field-input{width:100%;padding:14px 16px;border-radius:12px;background:var(–surface2);border:1px solid var(–border);font-size:16px}
.field-input:focus{border-color:var(–accent)}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:500;background:var(–surface2);color:var(–text);border:1px solid var(–border)}
.pill.on{background:var(–text);color:var(–surface);border-color:var(–text)}
.sheet-actions{display:flex;gap:8px;margin-top:24px}
.btn-delete{padding:12px 16px;border-radius:12px;background:var(–surface2);color:#dc2626;font-size:14px;font-weight:600;border:1px solid var(–border)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.hidden{display:none!important}

/* Seasonal */
.season-pills{display:flex;gap:6px;padding:0 20px 12px;overflow-x:auto}
.season-pill{flex:0 0 auto;padding:8px 14px;border-radius:99px;font-size:13px;font-weight:500;background:var(–surface);border:1px solid var(–border);color:var(–muted);white-space:nowrap}
.season-pill.on{background:var(–text);color:var(–surface);border-color:var(–text)}

/* Project filter pills */
.filter-pills{display:flex;gap:6px;padding:0 20px 12px;overflow-x:auto}
.filter-pill{flex:0 0 auto;padding:7px 12px;border-radius:99px;font-size:12px;font-weight:600;background:var(–surface);border:1px solid var(–border);color:var(–muted);white-space:nowrap}
.filter-pill.on{background:var(–text);color:var(–surface);border-color:var(–text)}
</style>

</head>
<body>
<div id="app"></div>
<div id="sheet-root"></div>

// HELPERS
// ══════════════════════════════════════════════════════════════════
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function fmtDate(d){return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"})}
function todayStart(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate())}
function weekStart(){const d=todayStart();d.setDate(d.getDate()-d.getDay());return d}

function doneOnDate(id,dateStart){
  const arr=choreLog[id]||[];const end=new Date(dateStart);end.setDate(end.getDate()+1);
  return arr.some(ts=>new Date(ts)>=dateStart&&new Date(ts)<end);
}
function doneThisWeek(id){
  const ws=weekStart();const arr=choreLog[id]||[];
  return arr.some(ts=>new Date(ts)>=ws);
}
function skippedOnDate(id,dateStart){
  const s=choreSkips[id];if(!s)return false;
  const end=new Date(dateStart);end.setDate(end.getDate()+1);
  return new Date(s)>=dateStart&&new Date(s)<end;
}
function skippedThisWeek(id){
  const s=choreSkips[id];if(!s)return false;
  return new Date(s)>=weekStart();
}
function lastTouch(id){
  const ld=choreLog[id]&&choreLog[id].length?choreLog[id][choreLog[id].length-1]:null;
  const sk=choreSkips[id];
  if(ld&&sk)return new Date(ld)>new Date(sk)?ld:sk;
  return ld||sk;
}

function isDoneForCycle(c){
  const ts=todayStart();
  if(c.frequency==="Daily")return doneOnDate(c.id,ts)||skippedOnDate(c.id,ts);
  if(c.frequency==="Weekly")return doneThisWeek(c.id)||skippedThisWeek(c.id);
  const t=lastTouch(c.id);if(!t)return false;
  const ds=Math.floor((Date.now()-new Date(t).getTime())/864e5);
  return ds<(FD[c.frequency]||30);
}

function nthWeekdayOfMonth(date){
  const dow=date.getDay();let count=0;
  const t=new Date(date.getFullYear(),date.getMonth(),1);
  while(t<=date){if(t.getDay()===dow)count++;t.setDate(t.getDate()+1)}
  return count;
}

function isDueInWeek(c,weekSun,dayNum){
  if(!c.days||!c.days.includes(dayNum))return false;
  const dayDate=new Date(weekSun);dayDate.setDate(dayDate.getDate()+dayNum);
  const f=c.frequency;
  if(f==="Daily"||f==="Weekly")return true;
  const weeksSince=Math.round((weekSun-SCHEDULE_ANCHOR)/(7*864e5));
  if(f==="2x/month"){
    if(c.id==="c5")return weeksSince%2===0;
    const nth=nthWeekdayOfMonth(dayDate);return nth===1||nth===3;
  }
  if(f==="1x/month"){const nth=nthWeekdayOfMonth(dayDate);return nth===(MONTHLY_NTH[c.id]||2)}
  if(f==="Every 6 weeks")return weeksSince%6===0;
  if(f==="Every 2 months")return weeksSince%8===0;
  return false;
}

// What's scheduled for today specifically
function todaysChores(){
  const today=new Date().getDay();const ws=weekStart();
  return chores.filter(c=>isDueInWeek(c,ws,today));
}

// What's overdue from earlier this week (not on today)
function getMissed(){
  const today=new Date().getDay();const ws=weekStart();const ts=todayStart();
  let missed=[];
  for(let d=0;d<today;d++){
    const dateStart=new Date(ws);dateStart.setDate(dateStart.getDate()+d);
    chores.filter(c=>isDueInWeek(c,ws,d)).forEach(c=>{
      if(missed.find(m=>m.id===c.id))return;
      if(doneOnDate(c.id,ts)||skippedOnDate(c.id,ts))return;
      if(c.frequency==="Weekly"&&(doneThisWeek(c.id)||skippedThisWeek(c.id)))return;
      if(c.frequency==="Daily"&&doneOnDate(c.id,dateStart))return;
      if(c.frequency==="Daily")return; // daily doesn't roll over
      if(!isDoneForCycle(c))missed.push({...c,missedDay:DAYS[d]});
    });
  }
  return missed;
}

function updateStreak(){
  const today=todayStart().toISOString();
  const todayChores=todaysChores();
  const allDone=todayChores.length>0&&todayChores.every(c=>doneOnDate(c.id,todayStart()));
  if(allDone&&streak.lastDate!==today){
    const yesterday=new Date(todayStart());yesterday.setDate(yesterday.getDate()-1);
    if(streak.lastDate===yesterday.toISOString()){streak.count++}else{streak.count=1}
    streak.lastDate=today;save.streak();
  }
}

// HOME (Today)
// ══════════════════════════════════════════════════════════════════
function renderHome(){
  const today=new Date();
  const todayDay=today.getDay();
  const greeting=(()=>{const h=today.getHours();if(h<12)return"Good morning";if(h<18)return"Good afternoon";return"Good evening"})();
  const todayChores=todaysChores();
  const todayDone=todayChores.filter(c=>doneOnDate(c.id,todayStart())||skippedOnDate(c.id,todayStart()));
  const todayPending=todayChores.filter(c=>!doneOnDate(c.id,todayStart())&&!skippedOnDate(c.id,todayStart()));
  const missed=getMissed();
  const pct=todayChores.length>0?Math.round((todayDone.length/todayChores.length)*100):0;
  const allDone=todayChores.length>0&&todayPending.length===0;

  let h=`<div class="app-header">
    <div class="greeting">${greeting}</div>
    ${streak.count>0?`<div class="header-action">🔥 ${streak.count}-day streak</div>`:""}
  </div>`;

  h+=`<div class="hero">
    <div class="hero-title">${DAYSFULL[todayDay]}</div>
    <div class="hero-sub">${MN[today.getMonth()]} ${today.getDate()}, ${today.getFullYear()}</div>
    <div class="hero-progress">
      <div class="hp-row">
        <div class="hp-numbers"><span class="hp-done">${todayDone.length}</span><span class="hp-total">/${todayChores.length}</span></div>
        <div class="hp-label">${allDone?"All done today":todayChores.length===0?"Nothing scheduled":todayPending.length+" to go"}</div>
      </div>
      <div class="hp-bar"><div class="hp-fill" style="width:${pct}%"></div></div>
    </div>
  </div>`;

  // Catch up
  if(missed.length>0){
    h+=`<div class="catchup" data-catchup-toggle>
      <div class="catchup-text">
        <div class="catchup-title">${missed.length} to catch up</div>
        <div class="catchup-sub">From earlier this week</div>
      </div>
      <div class="catchup-arrow ${state.catchupOpen?"open":""}">›</div>
    </div>`;
    if(state.catchupOpen){
      h+=`<div style="padding:8px 20px 0;display:flex;gap:8px;align-items:center;justify-content:flex-end">
        <button class="task-skip" data-bulk-complete>Complete all</button>
        <button class="task-skip" data-bulk-skip>Skip all</button>
      </div>`;
      h+=`<div class="task-list" style="margin-top:8px">${missed.map(c=>taskCard(c,false,c.missedDay)).join("")}</div>`;
    }
  }

  // Today's tasks
  if(todayChores.length>0){
    h+=`<div class="section"><div class="section-title"><h2>Today</h2></div></div>`;
    if(todayPending.length>0){
      h+=`<div class="task-list">${todayPending.map(c=>taskCard(c)).join("")}</div>`;
    }
    if(allDone){
      h+=`<div class="empty-state"><span class="empty-emoji">🎉</span><div class="empty-title">All done today</div><div class="empty-sub">Enjoy the rest of your day</div></div>`;
    }
    if(todayDone.length>0&&!allDone){
      h+=`<div class="section"><div class="section-title"><h2>Done</h2><span class="st-count">${todayDone.length}</span></div></div>`;
      h+=`<div class="task-list">${todayDone.map(c=>taskCard(c,true)).join("")}</div>`;
    }
    if(allDone){
      h+=`<div class="section"><div class="section-title"><h2>Completed</h2></div></div>`;
      h+=`<div class="task-list">${todayDone.map(c=>taskCard(c,true)).join("")}</div>`;
    }
  } else {
    h+=`<div class="empty-state"><span class="empty-emoji">☕</span><div class="empty-title">Nothing scheduled</div><div class="empty-sub">Take it easy today</div></div>`;
  }

  return h;
}

function taskCard(c,done,missedDay){
  done=done||doneOnDate(c.id,todayStart())||skippedOnDate(c.id,todayStart());
  return `<div class="task ${done?"done":""}" data-task-id="${c.id}">
    <div class="task-row">
      <button class="task-check ${done?"checked":""}" data-toggle="${c.id}">${done?"✓":""}</button>
      <div class="task-content">
        <div class="task-name">${esc(c.task)}</div>
        <div class="task-meta">
          <span class="task-freq">${c.frequency}</span>
          ${missedDay?`<span style="color:var(--warn-text)">· ${missedDay}</span>`:""}
        </div>
      </div>
      ${!done?`<button class="task-skip" data-skip="${c.id}">Skip</button>`:""}
    </div>
  </div>`;
}

// PLAN (week view)
// ══════════════════════════════════════════════════════════════════
function renderPlan(){
  const today=new Date();
  const todayDate=today.getDate(),todayMonth=today.getMonth(),todayYear=today.getFullYear();
  const ws=new Date(weekStart());ws.setDate(ws.getDate()+(state.weekOffset*7));
  const we=new Date(ws);we.setDate(we.getDate()+6);
  const weekLabel=ws.getMonth()===we.getMonth()
    ?`${MN[ws.getMonth()]} ${ws.getDate()}–${we.getDate()}, ${ws.getFullYear()}`
    :`${MN[ws.getMonth()]} ${ws.getDate()} – ${MN[we.getMonth()]} ${we.getDate()}`;
  const isThisWeek=state.weekOffset===0;
  const isBeforeAnchor=ws<SCHEDULE_ANCHOR;

  let h=`<div class="plan-header"><div class="plan-title">Plan</div></div>`;
  h+=`<div class="week-nav">
    <div class="week-label">${weekLabel}</div>
    <div class="week-arrows">
      ${!isThisWeek?`<button class="week-today" data-jump-today>Today</button>`:""}
      <button class="week-btn" data-week-prev ${ws<=SCHEDULE_ANCHOR?"disabled":""}>‹</button>
      <button class="week-btn" data-week-next>›</button>
    </div>
  </div>`;

  if(isBeforeAnchor){
    h+=`<div class="empty-state"><span class="empty-emoji">📅</span><div class="empty-title">Before schedule</div><div class="empty-sub">Schedule begins May 3, 2026</div></div>`;
  } else {
    for(let d=0;d<7;d++){
      const dayDate=new Date(ws);dayDate.setDate(dayDate.getDate()+d);
      const isToday=dayDate.getDate()===todayDate&&dayDate.getMonth()===todayMonth&&dayDate.getFullYear()===todayYear;
      const isPast=dayDate<todayStart()&&!isToday;
      const dateStr=`${MN[dayDate.getMonth()]} ${dayDate.getDate()}`;
      const sched=chores.filter(c=>isDueInWeek(c,ws,d));
      const open=state.openDay===d;

      h+=`<div class="day-card ${isToday?"today":""} ${isPast?"past":""}">
        <div class="day-head" data-toggle-day="${d}">
          <div class="day-head-left">
            ${isToday?`<div class="today-dot"></div>`:""}
            <div>
              <div class="day-name">${DAYSFULL[d]}</div>
              <div class="day-date">${dateStr}</div>
            </div>
          </div>
          <div class="day-count">
            ${sched.length} task${sched.length!==1?"s":""}
            <span class="day-arrow ${open?"open":""}">›</span>
          </div>
        </div>`;

      if(open){
        if(sched.length===0){
          h+=`<div class="day-empty">No tasks scheduled</div>`;
        } else {
          h+=`<div class="day-tasks">`;
          sched.forEach(c=>{
            const dotClass=c.frequency==="Daily"?"daily":c.frequency==="Weekly"?"weekly":"other";
            h+=`<div class="day-task">
              <div class="day-task-dot ${dotClass}"></div>
              <div class="day-task-name">${esc(c.task)}</div>
              <span class="day-task-freq">${c.frequency}</span>
              <button class="day-task-edit" data-reschedule="${c.id}">✎</button>
            </div>`;
            if(state.rescheduleId===c.id){
              const cur=c.days||[];
              h+=`<div class="reschedule-panel">
                <div class="rp-title">${c.frequency==="Daily"?'Daily — runs every day':'Move to'}</div>
                ${c.frequency==="Daily"?'':`<div class="day-pills" id="rp-${c.id}">
                  ${DAYS.map((dn,i)=>`<button class="day-pill ${cur.includes(i)?"on":""}" data-rp-day="${i}">${dn}</button>`).join("")}
                </div>`}
                <div class="rp-actions">
                  ${c.frequency!=="Daily"?`<button class="btn-primary" data-rp-save="${c.id}">Save</button>`:""}
                  <button class="btn-secondary" data-rp-cancel>${c.frequency==="Daily"?"Close":"Cancel"}</button>
                </div>
              </div>`;
            }
          });
          h+=`</div>`;
        }
      }
      h+=`</div>`;
    }
  }
  return h;
}

              <span class="task-freq">${cat.label}</span>
              ${p.priority==="high"?'<span style="color:var(--warn-text);font-weight:600">· High priority</span>':""}
              ${p.cost?`<span>· ${esc(p.cost)}</span>`:""}
            </div>
          </div>
        </div>
      </div>`;
    }).join("")}</div>`;
  }
  return h;
}

// ══════════════════════════════════════════════════════════════════
// SEASONAL LIST
// ══════════════════════════════════════════════════════════════════
function renderSeasonalList(){
  const tasks=maintTasks[state.season]||[];
  const done=tasks.filter(t=>maintDone[t.id]).length;
  let h=`<div class="detail-header">
    <button class="back-btn" data-nav="setup">‹</button>
    <div class="detail-title">Seasonal</div>
    <button class="add-btn" data-add-seasonal>+</button>
  </div>`;
  h+=`<div class="season-pills">${Object.entries(SEASONS).map(([k,v])=>`<button class="season-pill ${state.season===k?"on":""}" data-season="${k}">${v.icon} ${v.label}</button>`).join("")}</div>`;
  if(tasks.length>0){
    h+=`<div style="padding:0 20px 12px;font-size:13px;color:var(--muted)">${done}/${tasks.length} complete</div>`;
  }
  if(!tasks.length){
    h+=`<div class="empty-state"><span class="empty-emoji">🍂</span><div class="empty-title">No items for ${SEASONS[state.season].label}</div><div class="empty-sub">Tap + to add seasonal maintenance</div></div>`;
  } else {
    h+=`<div class="task-list">${tasks.map(t=>{
      const isDone=!!maintDone[t.id];
      return `<div class="task ${isDone?"done":""}">
        <div class="task-row">
          <button class="task-check ${isDone?"checked":""}" data-maint-toggle="${t.id}">${isDone?"✓":""}</button>
          <div class="task-content" data-edit-maint="${t.id}">
            <div class="task-name">${esc(t.task)}</div>
            <div class="task-meta">
              <span class="task-freq">${esc(t.area||"")}</span>
              ${t.cost?`<span>· ${esc(t.cost)}</span>`:""}
              ${t.priority==="high"?'<span style="color:var(--warn-text);font-weight:600">· High</span>':""}
            </div>
          </div>
        </div>
      </div>`;
    }).join("")}</div>`;
  }
  return h;
}

// ══════════════════════════════════════════════════════════════════
// SHEETS / MODALS
// ══════════════════════════════════════════════════════════════════
function showSheet(html){
  document.getElementById("sheet-root").innerHTML=`<div class="sheet-bg" data-sheet-close></div><div class="sheet"><div class="sheet-handle"></div>${html}</div>`;
  attachSheetEvents();
}
function closeSheet(){document.getElementById("sheet-root").innerHTML=""}

function showAddChoreSheet(existingChore){
  const editing=!!existingChore;
  const c=existingChore||{task:"",frequency:"Weekly",zone:"Whole House",minutes:15,days:[]};
  const html=`
    <div class="sheet-title">${editing?"Edit":"New"} Chore</div>
    <div class="sheet-field">
      <div class="field-label">Task</div>
      <input class="field-input" id="sheet-task" value="${esc(c.task)}" placeholder="What needs doing?">
    </div>
    <div class="sheet-field">
      <div class="field-label">Frequency</div>
      <div class="pills" id="sheet-freq">${FREQS.map(f=>`<button class="pill ${c.frequency===f?"on":""}" data-sheet-freq="${f}">${f}</button>`).join("")}</div>
    </div>
    <div class="sheet-field" id="sheet-days-wrap" ${c.frequency==="Daily"?'style="display:none"':""}>
      <div class="field-label">Days</div>
      <div class="pills" id="sheet-days">${DAYS.map((d,i)=>`<button class="pill ${(c.days||[]).includes(i)?"on":""}" data-sheet-day="${i}">${d}</button>`).join("")}</div>
    </div>
    <div class="sheet-field">
      <div class="field-label">Area</div>
      <div class="pills" id="sheet-zone">${ZONES.map(z=>`<button class="pill ${c.zone===z?"on":""}" data-sheet-zone="${z}">${z}</button>`).join("")}</div>
    </div>
    <div class="sheet-field">
      <div class="field-label">Estimated minutes</div>
      <input class="field-input" id="sheet-min" type="number" value="${c.minutes}">
    </div>
    <div class="sheet-actions">
      <button class="btn-primary" data-sheet-save="${editing?c.id:""}">${editing?"Save":"Add"}</button>
      ${editing?`<button class="btn-delete" data-sheet-delete="${c.id}">Delete</button>`:""}
      <button class="btn-secondary" data-sheet-close>Cancel</button>
    </div>`;
  showSheet(html);
}

      <div class="pills" id="sheet-cat">${CATS.map(c=>`<button class="pill ${p.category===c.key?"on":""}" data-sheet-cat="${c.key}">${c.label}</button>`).join("")}</div>
    </div>
    <div class="sheet-field">
      <div class="field-label">Priority</div>

  const html=`
    <div class="sheet-title">${editing?"Edit":"New"} ${SEASONS[state.season].label} Item</div>
    <div class="sheet-field">
      <div class="field-label">Task</div>
      <input class="field-input" id="sheet-task" value="${esc(t.task)}" placeholder="What needs doing?">
    </div>
    <div class="sheet-field">
      <div class="field-label">Area</div>
      <input class="field-input" id="sheet-area" value="${esc(t.area||'')}" placeholder="HVAC, Yard, etc">
    </div>
    <div class="sheet-field">
      <div class="field-label">Cost (optional)</div>
      <input class="field-input" id="sheet-cost" value="${esc(t.cost||'')}" placeholder="$50–100">
    </div>
    <div class="sheet-field">
      <div class="field-label">Priority</div>
      <div class="pills" id="sheet-pri">${PRIS.map(pr=>`<button class="pill ${t.priority===pr?"on":""}" data-sheet-pri="${pr}">${pr.charAt(0).toUpperCase()+pr.slice(1)}</button>`).join("")}</div>

// ══════════════════════════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════════════════════════
function attachEvents(){
  // Bottom nav
  document.querySelectorAll("[data-nav]").forEach(b=>b.addEventListener("click",()=>{
    state.view=b.dataset.nav;state.catchupOpen=false;state.openDay=null;state.rescheduleId=null;render();
  }));

  // Home: chore complete/skip
  document.querySelectorAll("[data-toggle]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();const id=b.dataset.toggle;const c=chores.find(x=>x.id===id);if(!c)return;
    const ts=todayStart();
    if(doneOnDate(c.id,ts)){
      // Undo
      const arr=choreLog[c.id]||[];const filtered=arr.filter(t=>{const d=new Date(t);return!(d>=ts&&d<new Date(ts.getTime()+864e5))});
      choreLog[c.id]=filtered;save.log();
    } else {
      // Complete
      delete choreSkips[c.id];
      if(!choreLog[c.id])choreLog[c.id]=[];
      choreLog[c.id].push(new Date().toISOString());
      save.log();save.skips();
    }
    render();
  }));
  document.querySelectorAll("[data-skip]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();choreSkips[b.dataset.skip]=new Date().toISOString();save.skips();render();
  }));

  // Catch-up
  document.querySelector("[data-catchup-toggle]")?.addEventListener("click",()=>{state.catchupOpen=!state.catchupOpen;render()});
  document.querySelector("[data-bulk-complete]")?.addEventListener("click",()=>{
    const missed=getMissed();const now=new Date().toISOString();
    missed.forEach(c=>{if(!choreLog[c.id])choreLog[c.id]=[];choreLog[c.id].push(now);delete choreSkips[c.id]});
    save.log();save.skips();render();
  });
  document.querySelector("[data-bulk-skip]")?.addEventListener("click",()=>{
    const missed=getMissed();const now=new Date().toISOString();
    missed.forEach(c=>{choreSkips[c.id]=now});save.skips();render();
  });

  // Plan
  document.querySelector("[data-week-prev]")?.addEventListener("click",()=>{state.weekOffset--;state.openDay=null;state.rescheduleId=null;render()});
  document.querySelector("[data-week-next]")?.addEventListener("click",()=>{state.weekOffset++;state.openDay=null;state.rescheduleId=null;render()});
  document.querySelector("[data-jump-today]")?.addEventListener("click",()=>{state.weekOffset=0;state.openDay=null;state.rescheduleId=null;render()});
  document.querySelectorAll("[data-toggle-day]").forEach(b=>b.addEventListener("click",()=>{
    const d=parseInt(b.dataset.toggleDay);state.openDay=state.openDay===d?null:d;state.rescheduleId=null;render();
  }));
  document.querySelectorAll("[data-reschedule]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();const id=b.dataset.reschedule;state.rescheduleId=state.rescheduleId===id?null:id;render();
  }));
  document.querySelectorAll("[data-rp-day]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();b.classList.toggle("on");
  }));
  document.querySelectorAll("[data-rp-save]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();const id=b.dataset.rpSave;const c=chores.find(x=>x.id===id);if(!c)return;
    const newDays=[];document.querySelectorAll(`#rp-${id} .day-pill.on`).forEach(p=>newDays.push(parseInt(p.dataset.rpDay)));
    if(newDays.length>0){c.days=newDays;save.chores()}
    state.rescheduleId=null;render();
  }));
  document.querySelector("[data-rp-cancel]")?.addEventListener("click",e=>{e.stopPropagation();state.rescheduleId=null;render()});

  // Setup nav
  document.querySelectorAll("[data-setup-nav]").forEach(b=>b.addEventListener("click",()=>{
    state.view=b.dataset.setupNav;render();
  }));

  // Chores list
  document.querySelector("[data-add-chore]")?.addEventListener("click",()=>showAddChoreSheet());
  document.querySelectorAll("[data-edit-chore]").forEach(b=>b.addEventListener("click",()=>{
    const c=chores.find(x=>x.id===b.dataset.editChore);if(c)showAddChoreSheet(c);
  }));

  // Projects list
  document.querySelector("[data-add-project]")?.addEventListener("click",()=>showAddProjectSheet());
  document.querySelectorAll("[data-edit-project]").forEach(b=>b.addEventListener("click",()=>{
    const p=projects.find(x=>x.id===b.dataset.editProject);if(p)showAddProjectSheet(p);
  }));
  document.querySelectorAll("[data-project-toggle]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();const p=projects.find(x=>x.id===b.dataset.projectToggle);
    if(p){p.done=!p.done;p.doneDate=p.done?new Date().toISOString():null;save.projects()}
    render();
  }));
  document.querySelectorAll("[data-filter]").forEach(b=>b.addEventListener("click",()=>{
    state.projectFilter=b.dataset.filter;render();
  }));

  // Seasonal
  document.querySelector("[data-add-seasonal]")?.addEventListener("click",()=>showAddSeasonalSheet());
  document.querySelectorAll("[data-edit-maint]").forEach(b=>b.addEventListener("click",()=>{
    const t=maintTasks[state.season].find(x=>x.id===b.dataset.editMaint);if(t)showAddSeasonalSheet(t);
  }));
  document.querySelectorAll("[data-maint-toggle]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();const id=b.dataset.maintToggle;
    if(maintDone[id])delete maintDone[id];else maintDone[id]=new Date().toISOString();
    save.maintDone();render();
  }));
  document.querySelectorAll("[data-season]").forEach(b=>b.addEventListener("click",()=>{
    state.season=b.dataset.season;render();
  }));
}

function attachSheetEvents(){
  document.querySelectorAll("[data-sheet-close]").forEach(b=>b.addEventListener("click",closeSheet));
  // Pill toggles (single-select)
  ["sheet-freq","sheet-zone","sheet-cat","sheet-pri"].forEach(id=>{
    document.querySelectorAll(`#${id} .pill`).forEach(p=>p.addEventListener("click",()=>{
      document.querySelectorAll(`#${id} .pill`).forEach(x=>x.classList.remove("on"));
      p.classList.add("on");
      // If frequency changes to Daily, hide days; otherwise show
      if(id==="sheet-freq"){
        const wrap=document.getElementById("sheet-days-wrap");
        if(wrap)wrap.style.display=p.dataset.sheetFreq==="Daily"?"none":"";
      }
    }));
  });
  // Days multi-select
  document.querySelectorAll("#sheet-days .pill").forEach(p=>p.addEventListener("click",()=>p.classList.toggle("on")));

  // Save chore
  document.querySelector("[data-sheet-save]")?.addEventListener("click",e=>{
    const editingId=e.currentTarget.dataset.sheetSave;
    const task=document.getElementById("sheet-task").value.trim();if(!task)return;
    const freq=document.querySelector("#sheet-freq .pill.on")?.dataset.sheetFreq||"Weekly";
    const zone=document.querySelector("#sheet-zone .pill.on")?.dataset.sheetZone||"Whole House";
    const min=parseInt(document.getElementById("sheet-min").value)||15;
    let days=[];
    if(freq==="Daily"){days=[0,1,2,3,4,5,6]}
    else{document.querySelectorAll("#sheet-days .pill.on").forEach(p=>days.push(parseInt(p.dataset.sheetDay)))}
    if(editingId){
      const c=chores.find(x=>x.id===editingId);if(c){c.task=task;c.frequency=freq;c.zone=zone;c.minutes=min;c.days=days}
    } else {
      chores.push({id:"c-"+uid(),task,frequency:freq,zone,minutes:min,days});
    }
    save.chores();closeSheet();render();
  });
  document.querySelector("[data-sheet-delete]")?.addEventListener("click",e=>{
    const id=e.currentTarget.dataset.sheetDelete;
    chores=chores.filter(x=>x.id!==id);save.chores();closeSheet();render();
  });

  // Save project
  document.querySelector("[data-project-save]")?.addEventListener("click",e=>{
    const editingId=e.currentTarget.dataset.projectSave;
    const task=document.getElementById("sheet-task").value.trim();if(!task)return;
    const cost=document.getElementById("sheet-cost").value.trim();
    const cat=document.querySelector("#sheet-cat .pill.on")?.dataset.sheetCat||"other";
    const pri=document.querySelector("#sheet-pri .pill.on")?.dataset.sheetPri||"medium";
    if(editingId){
      const p=projects.find(x=>x.id===editingId);if(p){p.task=task;p.cost=cost;p.category=cat;p.priority=pri}
    } else {
      projects.unshift({id:"p-"+uid(),task,cost,category:cat,priority:pri,added:new Date().toISOString(),done:false,doneDate:null});
    }
    save.projects();closeSheet();render();
  });
  document.querySelector("[data-project-delete]")?.addEventListener("click",e=>{
    const id=e.currentTarget.dataset.projectDelete;
    projects=projects.filter(x=>x.id!==id);save.projects();closeSheet();render();
  });

  // Save seasonal
  document.querySelector("[data-maint-save]")?.addEventListener("click",e=>{
    const editingId=e.currentTarget.dataset.maintSave;
    const task=document.getElementById("sheet-task").value.trim();if(!task)return;
    const area=document.getElementById("sheet-area").value.trim();
    const cost=document.getElementById("sheet-cost").value.trim();
    const pri=document.querySelector("#sheet-pri .pill.on")?.dataset.sheetPri||"medium";
    if(editingId){
      const t=maintTasks[state.season].find(x=>x.id===editingId);if(t){t.task=task;t.area=area;t.cost=cost;t.priority=pri}
    } else {
      maintTasks[state.season].push({id:"m-"+uid(),task,area,cost,priority:pri});
    }
    save.maint();closeSheet();render();
  });
  document.querySelector("[data-maint-delete]")?.addEventListener("click",e=>{
    const id=e.currentTarget.dataset.maintDelete;
    maintTasks[state.season]=maintTasks[state.season].filter(x=>x.id!==id);save.maint();closeSheet();render();
  });
}

render();
</script>
