<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#faf9f7;min-height:100vh;max-width:520px;margin:0 auto;padding-bottom:90px;font-size:16px}
button,input,select{font-family:inherit}button{cursor:pointer}input{-webkit-appearance:none}

.header{background:linear-gradient(135deg,#1a3a2a,#2d6a4f,#40916c);padding:32px 22px 24px;color:#fff;position:relative;overflow:hidden}
.header::before{content:’’;position:absolute;top:-20px;right:-20px;width:120px;height:120px;background:rgba(255,255,255,.06);border-radius:50%}
.header::after{content:’’;position:absolute;bottom:-30px;left:30%;width:180px;height:180px;background:rgba(255,255,255,.04);border-radius:50%}
.header h1{font-family:‘DM Serif Display’,serif;font-size:28px;letter-spacing:-.5px;font-weight:400;position:relative;z-index:1}
.header .sub{font-size:13px;opacity:.5;margin-top:5px;letter-spacing:.5px;text-transform:uppercase;position:relative;z-index:1}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e8e5e0;position:sticky;top:0;z-index:100}
.tab-btn{flex:1;padding:14px 0 12px;border:none;background:none;font-size:15px;color:#999;border-bottom:2.5px solid transparent;transition:all .2s}
.tab-btn.active{font-weight:600;color:#2d3436;border-bottom-color:#2d3436}
.tab-btn .ico{font-size:20px;display:block;margin-bottom:2px}
.content{padding:0 18px}.hidden{display:none}

.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:8px 14px;border-radius:8px;font-size:14px;border:1px solid #ddd;background:#fff}
.pill.on{border:2px solid #2d3436;background:#f0f0f0;font-weight:600}
.banner{border-radius:14px;padding:16px 18px;margin:18px 0;display:flex;justify-content:space-between;align-items:center}
.blabel{font-weight:600;font-size:17px}.bsub{font-size:14px;color:#666;margin-top:3px}
.addbtn{width:100%;padding:16px;border-radius:12px;border:2px dashed #ccc;background:#fff;font-size:16px;color:#888;font-weight:500}
.fbox{background:#fff;border-radius:14px;padding:18px;border:1px solid #ddd;margin-bottom:14px}
.finput{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #ddd;font-size:16px;margin-bottom:12px}
.flabel{font-size:14px;color:#888;margin-bottom:8px;font-weight:500}
.btnp{padding:13px;border-radius:10px;border:none;background:#2d3436;color:#fff;font-size:16px;font-weight:600}
.btns{padding:13px 18px;border-radius:10px;border:1px solid #ddd;background:#fff;font-size:16px;color:#666}
.btndanger{padding:10px 16px;border-radius:8px;border:1px solid #e57373;background:#fff;font-size:14px;color:#c62828}
.rbtn{padding:8px 14px;border-radius:8px;border:1px solid #ccc;background:#fff;font-size:14px;color:#666}
.actions{display:flex;gap:8px;margin-top:8px}.act{font-size:13px;color:#999;background:none;border:none;padding:3px 8px;text-decoration:underline}

/* Weekly calendar bar */
.week-bar{display:flex;gap:4px;margin:18px 0 14px}
.day-btn{flex:1;text-align:center;padding:10px 0;border-radius:12px;border:1.5px solid #e8e5e0;background:#fff;font-size:13px;color:#888;transition:all .15s}
.day-btn .dn{font-size:11px;font-weight:400;display:block;margin-top:1px}
.day-btn.today{border-color:#2d6a4f;color:#2d6a4f;font-weight:600}
.day-btn.sel{background:#2d3436;color:#fff;border-color:#2d3436;font-weight:600}
.day-btn.sel.today{background:#2d6a4f;border-color:#2d6a4f}
.day-btn.has-due::after{content:’’;display:block;width:6px;height:6px;border-radius:50%;background:#e65100;margin:4px auto 0}

/* View toggles */
.vtoggle{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.vpill{padding:8px 16px;border-radius:18px;border:1px solid #ddd;background:#fff;color:#666;font-size:14px;white-space:nowrap}
.vpill.on{border:1.5px solid #2d3436;background:#2d3436;color:#fff;font-weight:600}

/* Chore card */
.cc{background:#fff;border-radius:12px;padding:14px;margin-bottom:6px;border:1px solid #eee;display:flex;align-items:center;gap:12px}
.cc.ccdn{background:#fafafa;border-color:#e8f5e9;opacity:.55}
.cc.overdue-card{border-left:3px solid #e65100}
.cchk{width:38px;height:38px;border-radius:9px;flex-shrink:0;border:2.5px solid #4a7c59;background:#fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px}
.cchk.on{border:none;background:#4a7c59}
.skip-btn{width:38px;height:38px;border-radius:9px;flex-shrink:0;border:2px solid #ccc;background:#fff;display:flex;align-items:center;justify-content:center;color:#999;font-size:18px}
.ctit{font-size:16px;font-weight:500}.cmeta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center}.cmeta span{font-size:13px}
.fbadge{flex-shrink:0;font-size:13px;font-weight:600;background:#f0f0f0;padding:6px 12px;border-radius:8px;color:#555;white-space:nowrap}
.count-badge{font-size:12px;color:#4a7c59;font-weight:600;background:#e8f5e9;padding:3px 8px;border-radius:6px}
.zh{display:flex;align-items:center;justify-content:space-between;padding:10px 4px 8px;border-bottom:1.5px solid #e8e5e0;margin-bottom:8px}
.zl{font-size:16px;font-weight:600;color:#2d3436}.zd{font-size:13px;background:#fff3e0;color:#e65100;padding:3px 10px;border-radius:12px;font-weight:600}

/* Season */
.spills{display:flex;gap:8px;margin:18px 0 14px;overflow-x:auto;padding-bottom:2px}
.sp{flex:0 0 auto;padding:10px 18px;border-radius:22px;border:1px solid #ddd;background:#fff;color:#888;font-size:15px;white-space:nowrap}
.sp.on{font-weight:600;border-width:2px}
.pbox{border-radius:14px;padding:16px 18px;margin-bottom:18px}
.pbg{background:#ddd;border-radius:5px;height:8px;overflow:hidden}
.pfill{height:100%;border-radius:5px;transition:width .4s ease}
.card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid #eee;transition:all .2s}
.card.dn{opacity:.65;border-color:#d4edda}
.crow{display:flex;gap:12px;align-items:flex-start}
.chk{width:26px;height:26px;border-radius:7px;flex-shrink:0;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;margin-top:1px;background:#fff;cursor:pointer}
.chk.on{border:none}
.ctitle{font-size:16px;font-weight:500}.ctitle.struck{text-decoration:line-through;color:#999}
.tags{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center}
.tg{font-size:13px;background:#f0f0f0;padding:3px 10px;border-radius:5px;color:#666}.tg.pri{background:#fff3e0;color:#e65100;font-weight:600}
.cnote{font-size:14px;color:#888;margin-top:6px;font-style:italic}.cdate{font-size:13px;color:#aaa;margin-top:5px}

.fpills{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.fpill{padding:8px 16px;border-radius:18px;border:1px solid #ddd;background:#fff;color:#666;font-size:14px;white-space:nowrap}
.fpill.on{border:1.5px solid #2d3436;background:#2d3436;color:#fff;font-weight:600}
.pcard{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;border:1px solid #eee;display:flex;align-items:flex-start;gap:12px}
.pcard.pdn{opacity:.55}
.pchk{width:32px;height:32px;border-radius:8px;flex-shrink:0;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;margin-top:2px;background:#fff;cursor:pointer}
.pchk.on{border:none;background:#4a7c59}
.empty{text-align:center;padding:36px 0;color:#bbb;font-size:16px}
.upd{text-align:center;padding:14px 0;margin-top:10px;font-size:15px;color:#4a7c59;font-weight:500}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:18px 18px 0 0;padding:24px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:19px;font-weight:600;margin-bottom:16px}
</style>

</head>

<script>
// ══════════════════════════════════════
// DATA — days: array of day numbers (0=Sun,1=Mon,...6=Sat), empty=any day
// ══════════════════════════════════════
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DEF_MAINT={
  spring:[

    {id:"u2",task:"Big dog baths — all 3",area:"Dogs",effort:"DIY/Pro",cost:"$0–75/ea",priority:"medium"},

    {id:"w4",task:"File taxes — gather W-2s, 1099s, start prep",area:"Admin",effort:"DIY",cost:"$0",priority:"high",note:"Get ahead before April"},
    {id:"w5",task:"Re-soil houseplants (winter repotting)",area:"Interior",effort:"DIY",cost:"$15–30",priority:"low"},
  ],
};

const DEF_CHORES=[
  // Daily
  {id:"c19",task:"William kitchen & living room",frequency:"Daily",zone:"Kitchen",minutes:15,days:[0,1,2,3,4,5,6]},
  {id:"c20",task:"Water outside plants",frequency:"Daily",zone:"Whole House",minutes:10,days:[0,1,2,3,4,5,6]},
  // Weekly with specific days
  {id:"c8",task:"Wash bedding",frequency:"Weekly",zone:"Bedrooms",minutes:15,days:[0]},
  {id:"c21",task:"Pay Dende",frequency:"Weekly",zone:"Kitchen",minutes:5,days:[6]},
  {id:"c22",task:"Order Dende",frequency:"Weekly",zone:"Kitchen",minutes:5,days:[2]},
  {id:"c23",task:"Laundry white",frequency:"Weekly",zone:"Bedrooms",minutes:15,days:[3]},
  {id:"c24",task:"Laundry Bennet",frequency:"Weekly",zone:"Bedrooms",minutes:15,days:[3]},
  {id:"c25",task:"Harry Craig",frequency:"Weekly",zone:"Whole House",minutes:10,days:[3]},
  {id:"c26",task:"Harry Kristen",frequency:"Weekly",zone:"Whole House",minutes:10,days:[3]},
  {id:"c27",task:"Harry Matt & Gabby",frequency:"Weekly",zone:"Whole House",minutes:10,days:[3]},
  {id:"c28",task:"Laundry black",frequency:"Weekly",zone:"Bedrooms",minutes:15,days:[5]},
  {id:"c29",task:"Refill vitamins",frequency:"Weekly",zone:"Kitchen",minutes:5,days:[6]},
  {id:"c30",task:"Water inside plants",frequency:"Weekly",zone:"Whole House",minutes:10,days:[0,4]},
  {id:"c31",task:"Water cactus",frequency:"Weekly",zone:"Whole House",minutes:5,days:[0,4]},
  {id:"c14",task:"Clean Bennet's car seat",frequency:"Weekly",zone:"Car",minutes:20,days:[2]},
  // 2x/month with specific day
  {id:"c5",task:"Buddha bath",frequency:"2x/month",zone:"Dogs",minutes:30,days:[3]},
  {id:"c1",task:"Clean toilets and shower",frequency:"2x/month",zone:"Bathrooms",minutes:25,days:[]},
  {id:"c2",task:"Clean bathroom and bedroom mirrors",frequency:"2x/month",zone:"Bath/Bedrooms",minutes:10,days:[]},
  {id:"c10",task:"Wash Buddha's bed",frequency:"2x/month",zone:"Dogs",minutes:15,days:[]},
  {id:"c11",task:"Clean kitchen counters (deep clean)",frequency:"2x/month",zone:"Kitchen",minutes:15,days:[]},
  // Monthly
  {id:"c3",task:"Clean house windows",frequency:"1x/month",zone:"Whole House",minutes:30,days:[]},
  {id:"c4",task:"Mop floors",frequency:"1x/month",zone:"Whole House",minutes:25,days:[]},
  {id:"c7",task:"Deep clean fridge",frequency:"1x/month",zone:"Kitchen",minutes:30,days:[]},
  {id:"c12",task:"Wash couch cushion covers",frequency:"1x/month",zone:"Living Room",minutes:15,days:[]},
  {id:"c13",task:"Wash kitchen seat covers",frequency:"1x/month",zone:"Kitchen",minutes:10,days:[]},
  {id:"c15",task:"Wash car",frequency:"1x/month",zone:"Car",minutes:30,days:[]},
  {id:"c17",task:"Clean floor fans and A/C filters",frequency:"1x/month",zone:"Whole House",minutes:20,days:[]},
  {id:"c18",task:"Clean bedroom ceiling fans",frequency:"1x/month",zone:"Bedrooms",minutes:15,days:[]},
  // 6 weeks+
  {id:"c6",task:"Buddha flea meds",frequency:"Every 6 weeks",zone:"Dogs",minutes:5,days:[]},
  {id:"c9",task:"Wash trash cans",frequency:"Every 2 months",zone:"Whole House",minutes:20,days:[]},
  {id:"c16",task:"Wash bedroom curtains",frequency:"Every 2 months",zone:"Bedrooms",minutes:15,days:[]},
];

const DEF_PROJECTS=[
  {id:"p-1",task:"Reseal bathroom grout with silicone (mold removal & prevention)",priority:"high",cost:"$20–50 DIY",category:"repair",added:new Date().toISOString(),done:false,doneDate:null},
  {id:"p-2",task:"Reseal windows with silicone",priority:"medium",cost:"$15–40 DIY",category:"repair",added:new Date().toISOString(),done:false,doneDate:null},
  {id:"p-3",task:"Replace wall outlets",priority:"medium",cost:"$30–80 DIY",category:"upgrade",added:new Date().toISOString(),done:false,doneDate:null},
];

// Config
const SEASONS={spring:{label:"Spring",icon:"🌱",color:"#4a7c59",bg:"#f0f7f1"},summer:{label:"Summer",icon:"☀️",color:"#c4762b",bg:"#fdf6ee"},fall:{label:"Fall",icon:"🍂",color:"#8b5e3c",bg:"#faf3ed"},winter:{label:"Winter",icon:"❄️",color:"#4a6b8a",bg:"#eef3f8"}};
const FO={"Daily":0,"Weekly":1,"2x/month":2,"1x/month":3,"Every 6 weeks":4,"Every 2 months":5};
const FD={"Daily":1,"Weekly":7,"2x/month":14,"1x/month":30,"Every 6 weeks":42,"Every 2 months":60};
const FREQS=["Daily","Weekly","2x/month","1x/month","Every 6 weeks","Every 2 months"];
const ZC={"Bathrooms":{icon:"🚿",label:"Bathrooms"},"Bath/Bedrooms":{icon:"🪞",label:"Bath & Bedrooms"},"Bedrooms":{icon:"🛏️",label:"Bedrooms"},"Kitchen":{icon:"🍳",label:"Kitchen"},"Living Room":{icon:"🛋️",label:"Living Room"},"Dogs":{icon:"🐕",label:"Dogs"},"Car":{icon:"🚗",label:"Car"},"Whole House":{icon:"🏠",label:"Whole House"}};
const ZO=["Bathrooms","Bath/Bedrooms","Kitchen","Living Room","Bedrooms","Dogs","Car","Whole House"];
const EFFORTS=["DIY","DIY/Pro","Pro"];const PRIORITIES=["high","medium","low"];
const CATS=[{key:"repair",label:"Repair",icon:"🔨"},{key:"upgrade",label:"Upgrade",icon:"⬆️"},{key:"cosmetic",label:"Cosmetic",icon:"🎨"},{key:"yard",label:"Yard",icon:"🌿"},{key:"organize",label:"Organize",icon:"📦"},{key:"other",label:"Other",icon:"📌"}];
const PC={high:{bg:"#fff3e0",color:"#e65100",label:"High"},medium:{bg:"#e3f2fd",color:"#1565c0",label:"Med"},low:{bg:"#f0f0f0",color:"#666",label:"Low"}};

// ══════════════════════════════════════
// STORAGE — v4 keys to avoid conflicts
// ══════════════════════════════════════
function ld(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function sv(k,v){localStorage.setItem(k,JSON.stringify(v))}

let maintTasks=ld("hm4-maint",null)||JSON.parse(JSON.stringify(DEF_MAINT));
let maintDone=ld("hm4-maintdone",{});
let chores=ld("hm4-chores",null)||JSON.parse(JSON.stringify(DEF_CHORES));
let choreLog=ld("hm4-chorelog",{}); // {choreId: lastDoneISO}
let choreCount=ld("hm4-chorecount",{}); // {choreId: number}
let choreSkips=ld("hm4-choreskips",{}); // {choreId: lastSkipISO}
let projects=ld("hm4-projects",null)||[...DEF_PROJECTS];
if(!ld("hm4-maint",null))sv("hm4-maint",maintTasks);
if(!ld("hm4-chores",null))sv("hm4-chores",chores);
if(!ld("hm4-projects",null))sv("hm4-projects",projects);

function saveMaint(){sv("hm4-maint",maintTasks)}
function saveMaintDone(){sv("hm4-maintdone",maintDone)}
function saveChores(){sv("hm4-chores",chores)}
function saveChoreLogs(){sv("hm4-chorelog",choreLog);sv("hm4-chorecount",choreCount);sv("hm4-choreskips",choreSkips)}
function saveProjects(){sv("hm4-projects",projects)}

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let curTab="chores";
let curSeason=(()=>{const m=new Date().getMonth();if(m>=2&&m<=4)return"spring";if(m>=5&&m<=7)return"summer";if(m>=8&&m<=10)return"fall";return"winter"})();
let projFilter="all";
let choreView="week"; // "week","due","all"
let selectedDay=new Date().getDay(); // 0-6
let showForm={maint:false,chore:false,proj:false};
let editItem=null;

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function fmtDate(d){return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"})}
function daysAgo(d){const x=Math.floor((Date.now()-new Date(d).getTime())/864e5);if(x===0)return"Today";if(x===1)return"Yesterday";return x+"d ago"}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
// Get start of current week (Sunday 00:00)
function getWeekStart(){
  const now=new Date();const d=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  d.setDate(d.getDate()-d.getDay()); // back to Sunday
  return d;
}
function isDoneThisWeek(c){
  const last=choreLog[c.id];if(!last)return false;
  return new Date(last)>=getWeekStart();
}
function isSkippedThisWeek(c){
  const s=choreSkips[c.id];if(!s)return false;
  return new Date(s)>=getWeekStart();
}
function isOverdue(c){
  const last=choreLog[c.id];const skipped=choreSkips[c.id];
  const latest=last&&skipped?(new Date(last)>new Date(skipped)?last:skipped):(last||skipped);
  if(!latest)return true;
  // Weekly and daily chores: reset every Sunday
  if(c.frequency==="Daily"||c.frequency==="Weekly"){
    return!isDoneThisWeek(c)&&!isSkippedThisWeek(c);
  }
  const ds=Math.floor((Date.now()-new Date(latest).getTime())/864e5);
  return ds>=(FD[c.frequency]||30);
}
function isDoneToday(c){
  const last=choreLog[c.id];if(!last)return false;
  const d=new Date(last),t=new Date();
  return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();
}
function isSkippedToday(c){
  const s=choreSkips[c.id];if(!s)return false;
  const d=new Date(s),t=new Date();
  return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();
}
function isDueForDay(c,dayNum){
  if(c.frequency==="Daily"){
    if(dayNum===new Date().getDay()) return !(isDoneToday(c)||isSkippedToday(c));
    return true;
  }
  // Weekly: done this week means done for all days this week
  if(c.frequency==="Weekly") return !isDoneThisWeek(c)&&!isSkippedThisWeek(c);
  return isOverdue(c);
}
function getUrgency(c){
  const last=choreLog[c.id];const skipped=choreSkips[c.id];
  const latest=last&&skipped?(new Date(last)>new Date(skipped)?last:skipped):(last||skipped);
  if(!latest)return 1;
  const ds=Math.floor((Date.now()-new Date(latest).getTime())/864e5);
  const cycle=FD[c.frequency]||30;
  return(ds-cycle)/cycle;
}
function isScheduledForDay(c,dayNum){
  if(!c.days||c.days.length===0)return false;
  return c.days.includes(dayNum);
}

function renderChores(){
  const today=new Date().getDay();
  const allDue=chores.filter(c=>isOverdue(c));

  // For daily chores on day bar dots, check isDueForDay
  const dayHasDue=DAYS.map((_,i)=>{
    return chores.some(c=>isScheduledForDay(c,i)&&(c.frequency==="Daily"?(i===today&&isDueForDay(c,i)):isOverdue(c)));
  });

  let h="";

  // Add button FIRST (above view toggles)
  h+=`<div style="margin-top:16px;margin-bottom:12px">`;
  if(!showForm.chore)h+=`<button class="addbtn" id="show-add-chore">+ Add a chore</button>`;
  else{
    h+=`<div class="fbox"><input class="finput" id="nc-task" placeholder="What's the chore?"><input class="finput" id="nc-min" type="number" placeholder="Estimated minutes" min="1">
    <div class="flabel">Frequency</div><div class="pills" id="nc-freq">${FREQS.map(f=>`<button class="pill" data-fr="${f}">${f}</button>`).join("")}</div>
    <div class="flabel">Scheduled Days</div><div class="pills" id="nc-days">${DAYS.map((d,i)=>`<button class="pill" data-dy="${i}">${d}</button>`).join("")}</div>
    <div style="font-size:12px;color:#999;margin-bottom:12px">Tap days this chore should be done. Leave empty for flexible.</div>
    <div class="flabel">Area</div><div class="pills" id="nc-zone">${ZO.map(z=>`<button class="pill" data-zo="${z}">${ZC[z].icon} ${ZC[z].label}</button>`).join("")}</div>
    <div style="display:flex;gap:8px"><button class="btnp" style="flex:1" id="do-add-chore">Add</button><button class="btns" id="cancel-add-chore">Cancel</button></div></div>`;
  }
  h+=`</div>`;

  // View toggles
  const views=[{key:"week",label:"📅 This Week"},{key:"due",label:`⚡ Due (${allDue.length})`},{key:"all",label:"📋 All"}];
  h+=`<div class="vtoggle">${views.map(v=>`<button class="vpill ${choreView===v.key?"on":""}" data-cv="${v.key}">${v.label}</button>`).join("")}</div>`;

  // ─── WEEK VIEW ───
  if(choreView==="week"){
    h+=`<div class="week-bar">`;
    DAYS.forEach((d,i)=>{
      const isT=i===today,isSel=i===selectedDay;
      let cls="day-btn";if(isT)cls+=" today";if(isSel)cls+=" sel";
      if(dayHasDue[i]&&!isSel)cls+=" has-due";
      h+=`<button class="${cls}" data-day="${i}"><strong>${d}</strong></button>`;
    });
    h+=`</div>`;

    const scheduled=chores.filter(c=>isScheduledForDay(c,selectedDay));
    const isViewingToday=selectedDay===today;

    if(scheduled.length>0){
      // Separate into: overdue from other days, due today, completed today
      let overduePast=[], dueNow=[], completedToday=[];

      scheduled.forEach(c=>{
        if(isViewingToday){
          if(c.frequency==="Daily"){
            if(isDoneToday(c)||isSkippedToday(c)) completedToday.push(c);
            else dueNow.push(c);
          } else {
            if(isDoneToday(c)||isSkippedToday(c)) completedToday.push(c);
            else if(isOverdue(c)) overduePast.push(c);
            else dueNow.push(c);
          }
        } else {
          // Viewing another day - just show scheduled, can't complete
          if(c.frequency==="Daily") dueNow.push(c);
          else if(isOverdue(c)) overduePast.push(c);
          else dueNow.push(c);
        }
      });

      // Sort overdue by urgency
      overduePast.sort((a,b)=>getUrgency(b)-getUrgency(a));

      const totalOverdue=overduePast.length;
      const totalDue=dueNow.length;

      // Overdue section
      if(overduePast.length>0){
        h+=`<div class="zh"><div class="zl" style="color:#e65100">⚠️ Overdue</div><span class="zd">${totalOverdue}</span></div>`;
        h+=bulkActions("overdue",overduePast);
        overduePast.forEach(c=>{h+=choreCard(c,false,true)});
      }

      // Today's section
      if(dueNow.length>0){
        h+=`<div class="zh" style="${overduePast.length>0?"margin-top:18px":""}"><div class="zl">${DAYS[selectedDay]}${isViewingToday?" — Today":""}</div><span class="zd">${totalDue} to do</span></div>`;
        if(isViewingToday&&dueNow.length>1){h+=bulkActions("today",dueNow)}
        dueNow.forEach(c=>{h+=choreCard(c,false,true)});
      }

      if(overduePast.length===0&&dueNow.length===0&&!isViewingToday){
        h+=`<div class="empty" style="padding:24px 0">No pending chores for ${DAYS[selectedDay]}</div>`;
      }

      // Completed today section
      if(completedToday.length>0){
        h+=`<div class="zh" style="margin-top:18px"><div class="zl" style="color:#4a7c59">✓ Done today</div></div>`;
        completedToday.forEach(c=>{h+=choreCard(c,true,false)});
      }
    } else {
      h+=`<div class="empty" style="padding:24px 0">No scheduled chores for ${DAYS[selectedDay]}</div>`;
    }

    // Unscheduled overdue (only on today view)
    if(isViewingToday){
      const unscheduled=chores.filter(c=>(!c.days||c.days.length===0)&&isOverdue(c));
      if(unscheduled.length>0){
        h+=`<div class="zh" style="margin-top:18px"><div class="zl" style="color:#e65100">📌 Unscheduled & Overdue</div><span class="zd">${unscheduled.length}</span></div>`;
        h+=bulkActions("unsched",unscheduled);
        unscheduled.forEach(c=>{h+=choreCard(c,false,true)});
      }
    }
  }

  // ─── DUE VIEW ───
  else if(choreView==="due"){
    const sorted=[...allDue].sort((a,b)=>getUrgency(b)-getUrgency(a));
    if(!sorted.length)h+=`<div class="empty" style="padding:40px 0">🎉 All caught up!</div>`;
    else{
      h+=bulkActions("alldue",sorted);
      sorted.forEach(c=>{h+=choreCard(c,false,true)});
    }
  }

  // ─── ALL VIEW ───
  else{
    const pending=[...chores].filter(c=>c.frequency==="Daily"?!isDoneToday(c):isOverdue(c)).sort((a,b)=>(FO[a.frequency]||99)-(FO[b.frequency]||99));
    const done=[...chores].filter(c=>c.frequency==="Daily"?isDoneToday(c):!isOverdue(c)).sort((a,b)=>(FO[a.frequency]||99)-(FO[b.frequency]||99));
    if(pending.length>0){
      h+=`<div class="zh"><div class="zl">📋 Pending</div><span class="zd">${pending.length}</span></div>`;
      pending.forEach(c=>{h+=choreCard(c,false,false)});
    }
    if(done.length>0){
      h+=`<div class="zh" style="margin-top:16px"><div class="zl" style="color:#4a7c59">✓ Up to date</div></div>`;
      done.forEach(c=>{h+=choreCard(c,true,false)});
    }
  }

  document.getElementById("tab-chores").innerHTML=h;

  // ─── EVENTS ───
  document.querySelectorAll("[data-cv]").forEach(b=>b.addEventListener("click",()=>{choreView=b.dataset.cv;renderChores()}));
  document.querySelectorAll("[data-day]").forEach(b=>b.addEventListener("click",()=>{selectedDay=parseInt(b.dataset.day);renderChores()}));
  document.querySelectorAll("[data-cid]").forEach(b=>b.addEventListener("click",()=>{
    const id=b.dataset.cid;
    const c=chores.find(x=>x.id===id);
    // Toggle: if already done (today for daily, this period for others), undo it
    const alreadyDone=c&&((c.frequency==="Daily"&&isDoneToday(c))||(c.frequency==="Weekly"&&isDoneThisWeek(c))||(c.frequency!=="Daily"&&c.frequency!=="Weekly"&&choreLog[id]&&!isOverdue(c)));
    if(alreadyDone){
      delete choreLog[id];
      choreCount[id]=Math.max(0,(choreCount[id]||0)-1);
    } else {
      choreLog[id]=new Date().toISOString();
      choreCount[id]=(choreCount[id]||0)+1;
    }
    saveChoreLogs();renderChores();
  }));
  document.querySelectorAll("[data-skip]").forEach(b=>b.addEventListener("click",()=>{
    choreSkips[b.dataset.skip]=new Date().toISOString();saveChoreLogs();renderChores();
  }));
  document.querySelectorAll("[data-cedit]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();const item=chores.find(c=>c.id===b.dataset.cedit);if(item)showEditModal("chore",item);
  }));
  // Bulk actions
  document.querySelectorAll("[data-bulkcomplete]").forEach(b=>b.addEventListener("click",()=>{
    const ids=JSON.parse(b.dataset.bulkcomplete);const now=new Date().toISOString();
    ids.forEach(id=>{choreLog[id]=now;choreCount[id]=(choreCount[id]||0)+1});saveChoreLogs();renderChores();
  }));
  document.querySelectorAll("[data-bulkskip]").forEach(b=>b.addEventListener("click",()=>{
    const ids=JSON.parse(b.dataset.bulkskip);const now=new Date().toISOString();
    ids.forEach(id=>{choreSkips[id]=now});saveChoreLogs();renderChores();
  }));

  document.getElementById("show-add-chore")?.addEventListener("click",()=>{showForm.chore=true;renderChores()});
  document.getElementById("cancel-add-chore")?.addEventListener("click",()=>{showForm.chore=false;renderChores()});
  if(showForm.chore){
    pillSelect("nc-freq","fr","Weekly");pillSelect("nc-zone","zo","Whole House");
    document.querySelectorAll("#nc-days .pill").forEach(b=>b.addEventListener("click",()=>b.classList.toggle("on")));
  }
  document.getElementById("do-add-chore")?.addEventListener("click",()=>{
    const task=document.getElementById("nc-task")?.value.trim();if(!task)return;
    const days=[];document.querySelectorAll("#nc-days .pill.on").forEach(b=>days.push(parseInt(b.dataset.dy)));
    chores.push({id:"c-"+uid(),task,frequency:getSelected("nc-freq","fr","Weekly"),zone:getSelected("nc-zone","zo","Whole House"),minutes:parseInt(document.getElementById("nc-min")?.value)||15,days});
    saveChores();showForm.chore=false;renderChores();
  });
}

    <button class="rbtn" style="font-size:13px" data-bulkskip='${ids}'>→ Skip all</button>

function choreCard(c,done,showActions){
  const zc=ZC[c.zone]||{icon:"📌",label:c.zone};
  const count=choreCount[c.id]||0;
  const over=!done&&(c.frequency==="Daily"?isDueForDay(c,new Date().getDay()):isOverdue(c));
  return `<div class="cc ${done?"ccdn":""}${over?" overdue-card":""}" style="padding:10px 12px">
    ${over?`<button class="skip-btn" data-skip="${c.id}" title="Skip" style="width:34px;height:34px">→</button>`:""}
    <button class="cchk ${done?"on":""}" data-cid="${c.id}" style="width:34px;height:34px;font-size:15px">${done?"✓":""}</button>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:6px">
        <div class="ctit" style="flex:1;${done?"text-decoration:line-through;color:#999":""}">${esc(c.task)}</div>
        ${showActions?`<button class="act" data-cedit="${c.id}" style="font-size:15px;text-decoration:none;padding:4px 6px;color:#ccc">✎</button>`:""}
      </div>
      <div class="cmeta" style="margin-top:3px">
        <span style="color:#888">${zc.icon}</span>
        <span style="color:#999">~${c.minutes}m</span>
        ${count>0?`<span class="count-badge">✓${count}</span>`:""}
        ${choreLog[c.id]&&!done?`<span style="color:#c62828">${daysAgo(choreLog[c.id])}</span>`:""}
        ${!choreLog[c.id]&&!done?`<span style="color:#c62828">New</span>`:""}
        ${done&&choreLog[c.id]?`<span style="color:#4a7c59">${daysAgo(choreLog[c.id])}</span>`:""}
      </div>
    </div>
    <div class="fbadge" style="padding:4px 10px;font-size:12px">${c.frequency}</div>
  </div>`;
}

// ══════════════════════════════════════
// PROJECTS TAB (unchanged)
// ══════════════════════════════════════
function renderProjects(){
  const filtered=projects.filter(p=>{if(projFilter==="all")return!p.done;if(projFilter==="done")return p.done;if(projFilter==="high")return!p.done&&p.priority==="high";return!p.done&&p.category===projFilter});
  const hc=projects.filter(p=>!p.done&&p.priority==="high").length;
  let h=`<div style="margin:16px 0 12px">`;
  if(!showForm.proj)h+=`<button class="addbtn" id="show-add-proj">+ Add a project</button>`;
  else{h+=`<div class="fbox"><input class="finput" id="np-task" placeholder="What needs to be done?"><input class="finput" id="np-cost" placeholder="Cost (optional)"><div class="flabel">Category</div><div class="pills" id="np-cat">${CATS.map(c=>`<button class="pill" data-ca="${c.key}">${c.icon} ${c.label}</button>`).join("")}</div><div class="flabel">Priority</div><div class="pills" id="np-pri">${PRIORITIES.map(p=>`<button class="pill" data-pr="${p}" style="color:${PC[p].color}">${PC[p].label}</button>`).join("")}</div><div style="display:flex;gap:8px"><button class="btnp" style="flex:1" id="do-add-proj">Add</button><button class="btns" id="cancel-add-proj">Cancel</button></div></div>`}
  h+=`</div>`;
  const filters=[{key:"all",label:"To Do"},{key:"high",label:"🔴 High"},{key:"repair",label:"🔨 Repair"},{key:"upgrade",label:"⬆️ Upgrade"},{key:"yard",label:"🌿 Yard"},{key:"done",label:"✓ Done"}];
  h+=`<div class="fpills">${filters.map(f=>`<button class="fpill ${projFilter===f.key?"on":""}" data-pf="${f.key}">${f.label}</button>`).join("")}</div>`;
  h+=`<div style="font-size:14px;color:#999;margin-bottom:10px">${filtered.length} ${projFilter==="done"?"completed":"project"}${filtered.length!==1?"s":""}${projFilter==="all"&&hc>0?` <span style="color:#e65100">· ${hc} high priority</span>`:""}</div>`;
  if(!filtered.length)h+=`<div class="empty">${projFilter==="done"?"Nothing completed yet":"No projects — tap + to add one"}</div>`;
  filtered.forEach(p=>{const cat=CATS.find(c=>c.key===p.category)||CATS[5],pc=PC[p.priority];
    h+=`<div class="pcard ${p.done?"pdn":""}"><button class="pchk ${p.done?"on":""}" data-ptog="${p.id}">${p.done?"✓":""}</button><div style="flex:1"><div style="font-size:16px;font-weight:500;${p.done?"text-decoration:line-through;color:#999":""}">${esc(p.task)}</div><div style="display:flex;gap:8px;margin-top:7px;flex-wrap:wrap;align-items:center"><span class="tg">${cat.icon} ${cat.label}</span><span style="font-size:13px;background:${pc.bg};padding:3px 10px;border-radius:5px;color:${pc.color};font-weight:600">${pc.label}</span>${p.cost?`<span style="font-size:13px;color:#888">${esc(p.cost)}</span>`:""}<span style="font-size:13px;color:#bbb">Added ${fmtDate(p.added)}</span></div>${p.done&&p.doneDate?`<div style="font-size:13px;color:#aaa;margin-top:4px">Completed ${fmtDate(p.doneDate)}</div>`:""}${!p.done?`<div class="actions"><button class="act" data-pedit="${p.id}">edit</button></div>`:""}</div></div>`});
  document.getElementById("tab-projects").innerHTML=h;
  document.getElementById("show-add-proj")?.addEventListener("click",()=>{showForm.proj=true;renderProjects()});
  document.getElementById("cancel-add-proj")?.addEventListener("click",()=>{showForm.proj=false;renderProjects()});
  if(showForm.proj){pillSelect("np-cat","ca","repair");pillSelect("np-pri","pr","medium")}
  document.getElementById("do-add-proj")?.addEventListener("click",()=>{const task=document.getElementById("np-task")?.value.trim();if(!task)return;projects.unshift({id:"p-"+uid(),task,priority:getSelected("np-pri","pr","medium"),cost:document.getElementById("np-cost")?.value.trim()||"",category:getSelected("np-cat","ca","repair"),added:new Date().toISOString(),done:false,doneDate:null});saveProjects();showForm.proj=false;renderProjects()});
  document.querySelectorAll("[data-pf]").forEach(b=>b.addEventListener("click",()=>{projFilter=b.dataset.pf;renderProjects()}));
  document.querySelectorAll("[data-ptog]").forEach(b=>b.addEventListener("click",()=>{const p=projects.find(x=>x.id===b.dataset.ptog);if(p){p.done=!p.done;p.doneDate=p.done?new Date().toISOString():null}saveProjects();renderProjects()}));
  document.querySelectorAll("[data-pedit]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();const item=projects.find(p=>p.id===b.dataset.pedit);if(item)showEditModal("project",item)}));
}

render();
</script>

</body>
