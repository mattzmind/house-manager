<html lang="en">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#faf9f7;min-height:100vh;max-width:520px;margin:0 auto;padding-bottom:90px;font-size:16px}
button,input,select{font-family:inherit}button{cursor:pointer}input{-webkit-appearance:none}

.header{background:linear-gradient(135deg,#1a3a2a,#2d6a4f,#40916c);padding:32px 22px 24px;color:#fff;position:relative;overflow:hidden}
.header::before{content:’’;position:absolute;top:-20px;right:-20px;width:120px;height:120px;background:rgba(255,255,255,.06);border-radius:50%}
.header::after{content:’’;position:absolute;bottom:-30px;left:30%;width:180px;height:180px;background:rgba(255,255,255,.04);border-radius:50%}
.header h1{font-family:‘DM Serif Display’,serif;font-size:28px;letter-spacing:-.5px;font-weight:400;position:relative;z-index:1}
.header .sub{font-size:13px;opacity:.5;margin-top:5px;letter-spacing:.5px;text-transform:uppercase;position:relative;z-index:1}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e8e5e0;position:sticky;top:0;z-index:100}
.tab-btn{flex:1;padding:14px 0 12px;border:none;background:none;font-size:15px;color:#999;border-bottom:2.5px solid transparent;transition:all .2s}
.tab-btn.active{font-weight:600;color:#2d3436;border-bottom-color:#2d3436}
.tab-btn .ico{font-size:20px;display:block;margin-bottom:2px}
.content{padding:0 18px}.hidden{display:none}

/* Shared UI */
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:8px 14px;border-radius:8px;font-size:14px;border:1px solid #ddd;background:#fff}
.pill.on{border:2px solid #2d3436;background:#f0f0f0;font-weight:600}
.addbtn{width:100%;padding:16px;border-radius:12px;border:2px dashed #ccc;background:#fff;font-size:16px;color:#888;font-weight:500}
.fbox{background:#fff;border-radius:14px;padding:18px;border:1px solid #ddd;margin-bottom:14px}
.finput{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #ddd;font-size:16px;margin-bottom:12px}
.flabel{font-size:14px;color:#888;margin-bottom:8px;font-weight:500}
.btnp{padding:13px;border-radius:10px;border:none;background:#2d3436;color:#fff;font-size:16px;font-weight:600}
.btns{padding:13px 18px;border-radius:10px;border:1px solid #ddd;background:#fff;font-size:16px;color:#666}
.btndanger{padding:10px 16px;border-radius:8px;border:1px solid #e57373;background:#fff;font-size:14px;color:#c62828}
.rbtn{padding:8px 14px;border-radius:8px;border:1px solid #ccc;background:#fff;font-size:14px;color:#666}

/* ─── TODAY HEADER ─── */
.today-header{padding:20px 0 12px;display:flex;justify-content:space-between;align-items:flex-end}
.today-header .day-name{font-size:22px;font-weight:700;color:#2d3436}
.today-header .date{font-size:14px;color:#888;margin-top:2px}
.today-header .progress{font-size:14px;color:#4a7c59;font-weight:600;text-align:right}

/* ─── SECTION HEADERS ─── */
.sec{display:flex;align-items:center;justify-content:space-between;padding:10px 0 8px}
.sec-label{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}
.sec-count{font-size:13px;padding:2px 10px;border-radius:10px;font-weight:600}
.sec-actions{display:flex;gap:6px}
.sec-btn{font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#666}

/* ─── CHORE CARD (compact) ─── */
.tc{background:#fff;border-radius:10px;padding:11px 12px;margin-bottom:5px;border:1px solid #eee;display:flex;align-items:center;gap:10px}
.tc.tc-done{background:#fafafa;border-color:#e8f5e9;opacity:.5}
.tc.tc-missed{border-left:3px solid #e65100}
.tc-chk{width:34px;height:34px;border-radius:8px;flex-shrink:0;border:2.5px solid #4a7c59;background:#fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.tc-chk.on{border:none;background:#4a7c59}
.tc-skip{width:34px;height:34px;border-radius:8px;flex-shrink:0;border:2px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:17px}
.tc-body{flex:1;min-width:0}
.tc-top{display:flex;align-items:center;gap:6px}
.tc-name{font-size:15px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tc-name.struck{text-decoration:line-through;color:#999}
.tc-edit{font-size:15px;color:#ccc;background:none;border:none;padding:2px 6px}
.tc-meta{display:flex;gap:6px;margin-top:3px;align-items:center;flex-wrap:wrap}
.tc-meta span{font-size:12px}
.tc-badge{font-size:11px;font-weight:600;background:#f0f0f0;padding:3px 8px;border-radius:5px;color:#666}
.tc-cnt{font-size:11px;color:#4a7c59;font-weight:600;background:#e8f5e9;padding:2px 6px;border-radius:4px}

/* ─── WEEK OVERVIEW ─── */
.week-grid{display:flex;gap:3px;margin:12px 0 16px}
.wg-day{flex:1;background:#fff;border-radius:10px;border:1px solid #eee;padding:8px 2px;text-align:center;font-size:12px;color:#888;position:relative;overflow:hidden}
.wg-day.wg-today{border-color:#2d6a4f;color:#2d6a4f;font-weight:600}
.wg-day.wg-past{opacity:.5}
.wg-label{font-weight:600;font-size:11px;margin-bottom:4px;display:block}
.wg-dots{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;min-height:10px}
.wg-dot{width:7px;height:7px;border-radius:50%}
.wg-dot.pending{background:#e65100}
.wg-dot.done{background:#4a7c59}

/* ─── CATCH-UP SECTION ─── */
.catchup-bar{background:linear-gradient(135deg,#fff8e1,#fff3e0);border-radius:12px;padding:14px 16px;margin:12px 0;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.catchup-bar .cb-label{font-size:15px;font-weight:600;color:#e65100}
.catchup-bar .cb-sub{font-size:13px;color:#bf360c;margin-top:2px}
.catchup-bar .cb-arrow{font-size:18px;color:#e65100;transition:transform .2s}
.catchup-bar .cb-arrow.open{transform:rotate(90deg)}

/* Season (unchanged) */
.spills{display:flex;gap:8px;margin:18px 0 14px;overflow-x:auto;padding-bottom:2px}
.sp{flex:0 0 auto;padding:10px 18px;border-radius:22px;border:1px solid #ddd;background:#fff;color:#888;font-size:15px;white-space:nowrap}
.sp.on{font-weight:600;border-width:2px}
.pbox{border-radius:14px;padding:16px 18px;margin-bottom:18px}
.pbg{background:#ddd;border-radius:5px;height:8px;overflow:hidden}
.pfill{height:100%;border-radius:5px;transition:width .4s ease}
.card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid #eee}
.card.dn{opacity:.65;border-color:#d4edda}
.crow{display:flex;gap:12px;align-items:flex-start}
.chk{width:26px;height:26px;border-radius:7px;flex-shrink:0;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;margin-top:1px;background:#fff;cursor:pointer}
.chk.on{border:none}
.ctitle{font-size:16px;font-weight:500}.ctitle.struck{text-decoration:line-through;color:#999}
.tags{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center}
.tg{font-size:13px;background:#f0f0f0;padding:3px 10px;border-radius:5px;color:#666}.tg.pri{background:#fff3e0;color:#e65100;font-weight:600}
.cnote{font-size:14px;color:#888;margin-top:6px;font-style:italic}.cdate{font-size:13px;color:#aaa;margin-top:5px}
.actions{display:flex;gap:8px;margin-top:8px}.act{font-size:13px;color:#999;background:none;border:none;padding:3px 8px;text-decoration:underline}

/* Projects (unchanged) */
.fpills{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.fpill{padding:8px 16px;border-radius:18px;border:1px solid #ddd;background:#fff;color:#666;font-size:14px;white-space:nowrap}
.fpill.on{border:1.5px solid #2d3436;background:#2d3436;color:#fff;font-weight:600}
.pcard{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;border:1px solid #eee;display:flex;align-items:flex-start;gap:12px}
.pcard.pdn{opacity:.55}
.pchk{width:32px;height:32px;border-radius:8px;flex-shrink:0;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;margin-top:2px;background:#fff;cursor:pointer}
.pchk.on{border:none;background:#4a7c59}
.empty{text-align:center;padding:36px 0;color:#bbb;font-size:16px}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:18px 18px 0 0;padding:24px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:19px;font-weight:600;margin-bottom:16px}
</style>

</head>

<script>
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DAYSFULL=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DEF_MAINT={spring:[{id:"s1",task:"Clean air conditioner — coils, filters, clear drain line",area:"HVAC",effort:"DIY/Pro",cost:"$0–150",priority:"high",note:"Do before it gets hot"},{id:"s2",task:"Re-soil indoor & outdoor plants",area:"Yard/Interior",effort:"DIY",cost:"$20–50",priority:"medium"},{id:"s3",task:"File taxes",area:"Admin",effort:"DIY/Pro",cost:"$0–300",priority:"high",note:"Deadline April 15"},{id:"s4",task:"Big dog baths — all 3",area:"Dogs",effort:"DIY/Pro",cost:"$0–75/ea",priority:"medium"},{id:"s5",task:"Wash outdoor couch cushions",area:"Exterior",effort:"DIY",cost:"$0",priority:"low"},{id:"s6",task:"Rotate winter → summer clothes (swap garage boxes & closet)",area:"Interior",effort:"DIY",cost:"$0",priority:"medium"},{id:"s7",task:"Replace fridge water filter & air filter",area:"Kitchen",effort:"DIY",cost:"$20–40",priority:"medium"}],summer:[{id:"u1",task:"Clean air conditioner — mid-season check, rinse coils",area:"HVAC",effort:"DIY",cost:"$0",priority:"high",note:"SoCal heat means it's working hard"},{id:"u2",task:"Big dog baths — all 3",area:"Dogs",effort:"DIY/Pro",cost:"$0–75/ea",priority:"medium"},{id:"u3",task:"Wash outdoor couch cushions",area:"Exterior",effort:"DIY",cost:"$0",priority:"low"},{id:"u4",task:"Replace fridge water filter & air filter",area:"Kitchen",effort:"DIY",cost:"$20–40",priority:"medium"},{id:"u5",task:"Re-soil plants that need it (summer growth)",area:"Yard/Interior",effort:"DIY",cost:"$15–30",priority:"low"}],fall:[{id:"f1",task:"Clean fireplace — chimney & firebox",area:"Interior",effort:"Pro",cost:"$150–300",priority:"high",note:"Before first cold night"},{id:"f2",task:"Rotate summer → winter clothes (swap garage boxes & closet)",area:"Interior",effort:"DIY",cost:"$0",priority:"medium"},{id:"f3",task:"Big dog baths — all 3",area:"Dogs",effort:"DIY/Pro",cost:"$0–75/ea",priority:"medium"},{id:"f4",task:"Replace fridge water filter & air filter",area:"Kitchen",effort:"DIY",cost:"$20–40",priority:"medium"},{id:"f5",task:"Wash outdoor couch cushions (before storing for winter)",area:"Exterior",effort:"DIY",cost:"$0",priority:"low"}],winter:[{id:"w1",task:"Clean fireplace — mid-season if using frequently",area:"Interior",effort:"DIY",cost:"$0",priority:"medium"},{id:"w2",task:"Big dog baths — all 3",area:"Dogs",effort:"DIY/Pro",cost:"$0–75/ea",priority:"medium"},{id:"w3",task:"Replace fridge water filter & air filter",area:"Kitchen",effort:"DIY",cost:"$20–40",priority:"medium"},{id:"w4",task:"File taxes — gather W-2s, 1099s, start prep",area:"Admin",effort:"DIY",cost:"$0",priority:"high",note:"Get ahead before April"},{id:"w5",task:"Re-soil houseplants (winter repotting)",area:"Interior",effort:"DIY",cost:"$15–30",priority:"low"}]};
const DEF_CHORES=[
  {id:"c19",task:"William kitchen & living room",frequency:"Daily",zone:"Kitchen",minutes:15,days:[0,1,2,3,4,5,6]},
  {id:"c20",task:"Water outside plants",frequency:"Daily",zone:"Whole House",minutes:10,days:[0,1,2,3,4,5,6]},
  {id:"c8",task:"Wash bedding",frequency:"Weekly",zone:"Bedrooms",minutes:15,days:[0]},
  {id:"c21",task:"Pay Dende",frequency:"Weekly",zone:"Kitchen",minutes:5,days:[6]},
  {id:"c22",task:"Order Dende",frequency:"Weekly",zone:"Kitchen",minutes:5,days:[2]},
  {id:"c23",task:"Laundry white",frequency:"Weekly",zone:"Bedrooms",minutes:15,days:[3]},
  {id:"c24",task:"Laundry Bennet",frequency:"Weekly",zone:"Bedrooms",minutes:15,days:[3]},
  {id:"c25",task:"Harry Craig",frequency:"Weekly",zone:"Whole House",minutes:10,days:[3]},
  {id:"c26",task:"Harry Kristen",frequency:"Weekly",zone:"Whole House",minutes:10,days:[3]},
  {id:"c27",task:"Harry Matt & Gabby",frequency:"Weekly",zone:"Whole House",minutes:10,days:[3]},
  {id:"c28",task:"Laundry black",frequency:"Weekly",zone:"Bedrooms",minutes:15,days:[5]},
  {id:"c29",task:"Refill vitamins",frequency:"Weekly",zone:"Kitchen",minutes:5,days:[6]},
  {id:"c30",task:"Water inside plants",frequency:"Weekly",zone:"Whole House",minutes:10,days:[0,4]},
  {id:"c31",task:"Water cactus",frequency:"Weekly",zone:"Whole House",minutes:5,days:[0,4]},
  {id:"c14",task:"Clean Bennet's car seat",frequency:"Weekly",zone:"Car",minutes:20,days:[2]},
  {id:"c5",task:"Buddha bath",frequency:"2x/month",zone:"Dogs",minutes:30,days:[3]},
  {id:"c1",task:"Clean toilets and shower",frequency:"2x/month",zone:"Bathrooms",minutes:25,days:[]},
  {id:"c2",task:"Clean bathroom and bedroom mirrors",frequency:"2x/month",zone:"Bath/Bedrooms",minutes:10,days:[]},
  {id:"c10",task:"Wash Buddha's bed",frequency:"2x/month",zone:"Dogs",minutes:15,days:[]},
  {id:"c11",task:"Clean kitchen counters (deep clean)",frequency:"2x/month",zone:"Kitchen",minutes:15,days:[]},
  {id:"c3",task:"Clean house windows",frequency:"1x/month",zone:"Whole House",minutes:30,days:[]},
  {id:"c4",task:"Mop floors",frequency:"1x/month",zone:"Whole House",minutes:25,days:[]},
  {id:"c7",task:"Deep clean fridge",frequency:"1x/month",zone:"Kitchen",minutes:30,days:[]},
  {id:"c12",task:"Wash couch cushion covers",frequency:"1x/month",zone:"Living Room",minutes:15,days:[]},
  {id:"c13",task:"Wash kitchen seat covers",frequency:"1x/month",zone:"Kitchen",minutes:10,days:[]},
  {id:"c15",task:"Wash car",frequency:"1x/month",zone:"Car",minutes:30,days:[]},
  {id:"c17",task:"Clean floor fans and A/C filters",frequency:"1x/month",zone:"Whole House",minutes:20,days:[]},
  {id:"c18",task:"Clean bedroom ceiling fans",frequency:"1x/month",zone:"Bedrooms",minutes:15,days:[]},
  {id:"c6",task:"Buddha flea meds",frequency:"Every 6 weeks",zone:"Dogs",minutes:5,days:[]},
  {id:"c9",task:"Wash trash cans",frequency:"Every 2 months",zone:"Whole House",minutes:20,days:[]},
  {id:"c16",task:"Wash bedroom curtains",frequency:"Every 2 months",zone:"Bedrooms",minutes:15,days:[]},
];
const DEF_PROJECTS=[
  {id:"p-1",task:"Reseal bathroom grout with silicone (mold removal & prevention)",priority:"high",cost:"$20–50 DIY",category:"repair",added:new Date().toISOString(),done:false,doneDate:null},
  {id:"p-2",task:"Reseal windows with silicone",priority:"medium",cost:"$15–40 DIY",category:"repair",added:new Date().toISOString(),done:false,doneDate:null},
  {id:"p-3",task:"Replace wall outlets",priority:"medium",cost:"$30–80 DIY",category:"upgrade",added:new Date().toISOString(),done:false,doneDate:null},
];

const SEASONS={spring:{label:"Spring",icon:"🌱",color:"#4a7c59",bg:"#f0f7f1"},summer:{label:"Summer",icon:"☀️",color:"#c4762b",bg:"#fdf6ee"},fall:{label:"Fall",icon:"🍂",color:"#8b5e3c",bg:"#faf3ed"},winter:{label:"Winter",icon:"❄️",color:"#4a6b8a",bg:"#eef3f8"}};
const FD={"Daily":1,"Weekly":7,"2x/month":14,"1x/month":30,"Every 6 weeks":42,"Every 2 months":60};
const FREQS=["Daily","Weekly","2x/month","1x/month","Every 6 weeks","Every 2 months"];
const ZC={"Bathrooms":{icon:"🚿",label:"Bathrooms"},"Bath/Bedrooms":{icon:"🪞",label:"Bath & Bedrooms"},"Bedrooms":{icon:"🛏️",label:"Bedrooms"},"Kitchen":{icon:"🍳",label:"Kitchen"},"Living Room":{icon:"🛋️",label:"Living Room"},"Dogs":{icon:"🐕",label:"Dogs"},"Car":{icon:"🚗",label:"Car"},"Whole House":{icon:"🏠",label:"Whole House"}};
const ZO=["Bathrooms","Bath/Bedrooms","Kitchen","Living Room","Bedrooms","Dogs","Car","Whole House"];
const EFFORTS=["DIY","DIY/Pro","Pro"];const PRIORITIES=["high","medium","low"];
const CATS=[{key:"repair",label:"Repair",icon:"🔨"},{key:"upgrade",label:"Upgrade",icon:"⬆️"},{key:"cosmetic",label:"Cosmetic",icon:"🎨"},{key:"yard",label:"Yard",icon:"🌿"},{key:"organize",label:"Organize",icon:"📦"},{key:"other",label:"Other",icon:"📌"}];
const PC={high:{bg:"#fff3e0",color:"#e65100",label:"High"},medium:{bg:"#e3f2fd",color:"#1565c0",label:"Med"},low:{bg:"#f0f0f0",color:"#666",label:"Low"}};

// ── STORAGE (v5) ──
function ld(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function sv(k,v){localStorage.setItem(k,JSON.stringify(v))}
let maintTasks=ld("hm5-maint",null)||JSON.parse(JSON.stringify(DEF_MAINT));
let maintDone=ld("hm5-maintdone",{});
let chores=ld("hm5-chores",null)||JSON.parse(JSON.stringify(DEF_CHORES));
let choreLog=ld("hm5-chorelog",{}); // {id: [iso, iso, ...]} array of all completions
let choreSkips=ld("hm5-choreskips",{}); // {id: iso} last skip
let projects=ld("hm5-projects",null)||[...DEF_PROJECTS];
if(!ld("hm5-maint",null))sv("hm5-maint",maintTasks);
if(!ld("hm5-chores",null))sv("hm5-chores",chores);
if(!ld("hm5-projects",null))sv("hm5-projects",projects);
// First launch: seed all non-daily chores as freshly done so nothing starts overdue
if(!ld("hm5-seeded",false)){
  const now=new Date().toISOString();
  chores.forEach(c=>{
    if(c.frequency!=="Daily"&&!choreLog[c.id]){
      choreLog[c.id]=[now];
    }
  });
  sv("hm5-chorelog",choreLog);sv("hm5-seeded",true);
}
function saveMaint(){sv("hm5-maint",maintTasks)}
function saveMaintDone(){sv("hm5-maintdone",maintDone)}
function saveChores(){sv("hm5-chores",chores)}
function saveCL(){sv("hm5-chorelog",choreLog);sv("hm5-choreskips",choreSkips)}
function saveProjects(){sv("hm5-projects",projects)}

// ── STATE ──
let curTab="chores",curSeason=(()=>{const m=new Date().getMonth();if(m>=2&&m<=4)return"spring";if(m>=5&&m<=7)return"summer";if(m>=8&&m<=10)return"fall";return"winter"})();
let projFilter="all",showCatchUp=false,peekDay=null,showForm={maint:false,chore:false,proj:false},editItem=null;

// ── HELPERS ──
function fmtDate(d){return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"})}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

function todayStart(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate())}
function dayStart(offset){const d=todayStart();d.setDate(d.getDate()+offset);return d}
function weekStart(){const d=todayStart();d.setDate(d.getDate()-d.getDay());return d} // Sunday

function completionCount(id){return(choreLog[id]||[]).length}
function lastDone(id){const arr=choreLog[id];return arr&&arr.length?arr[arr.length-1]:null}
function doneOnDate(id,dateStart){
  const arr=choreLog[id]||[];const end=new Date(dateStart);end.setDate(end.getDate()+1);
  return arr.some(ts=>new Date(ts)>=dateStart&&new Date(ts)<end);
}
function doneThisWeek(id){
  const ws=weekStart();const arr=choreLog[id]||[];
  return arr.some(ts=>new Date(ts)>=ws);
}
function skippedOnDate(id,dateStart){
  const s=choreSkips[id];if(!s)return false;
  const end=new Date(dateStart);end.setDate(end.getDate()+1);
  return new Date(s)>=dateStart&&new Date(s)<end;
}
function skippedThisWeek(id){
  const ws=weekStart();const s=choreSkips[id];
  return s&&new Date(s)>=ws;
}

// Is this chore complete for a given day?
function isDoneForDate(c,dateStart){
  if(c.frequency==="Daily") return doneOnDate(c.id,dateStart)||skippedOnDate(c.id,dateStart);
  if(c.frequency==="Weekly") return doneThisWeek(c.id)||skippedThisWeek(c.id);
  // 2x/month and slower: done if last completion within cycle
  const ld=lastDone(c.id);const sk=choreSkips[c.id];
  const latest=ld&&sk?(new Date(ld)>new Date(sk)?ld:sk):(ld||sk);
  if(!latest)return false;
  const ds=Math.floor((Date.now()-new Date(latest).getTime())/864e5);
  return ds<(FD[c.frequency]||30);
}

// Which chores are scheduled for a specific day number (0=Sun)?
function scheduledFor(dayNum){
  return chores.filter(c=>{
    if(!c.days||c.days.length===0)return false;
    return c.days.includes(dayNum);
  });
}

// Get missed chores: scheduled for past days this week but not completed
function getMissed(){
  const today=new Date().getDay();
  const ws=weekStart();
  let missed=[];
  for(let d=0;d<today;d++){
    const dateStart=new Date(ws);dateStart.setDate(dateStart.getDate()+d);
    const scheduled=scheduledFor(d);
    scheduled.forEach(c=>{
      if(!isDoneForDate(c,dateStart)&&!missed.find(m=>m.id===c.id)){
        missed.push({...c,missedDay:DAYS[d]});
      }
    });
  }
  // Also add unscheduled overdue chores (no days set, past their cycle)
  chores.forEach(c=>{
    if(c.days&&c.days.length>0)return;
    if(!isDoneForDate(c,todayStart())&&!missed.find(m=>m.id===c.id)){
      missed.push({...c,missedDay:"overdue"});
    }
  });
  return missed;
}

function renderChores(){
  const today=new Date().getDay();
  const ts=todayStart();
  const todayChores=scheduledFor(today);
  const todayDone=todayChores.filter(c=>isDoneForDate(c,ts));
  const todayPending=todayChores.filter(c=>!isDoneForDate(c,ts));
  const missed=getMissed();
  const totalToday=todayChores.length;

  let h="";

  // ─── TODAY HEADER ───
  const now=new Date();
  const monthDay=now.toLocaleDateString("en-US",{month:"long",day:"numeric"});
  h+=`<div class="today-header">
    <div><div class="day-name">${DAYSFULL[today]}</div><div class="date">${monthDay}</div></div>
    <div class="progress">${todayDone.length}/${totalToday} done</div>
  </div>`;

  // ─── ADD BUTTON ───
  h+=`<div style="margin-bottom:14px">`;
  if(!showForm.chore)h+=`<button class="addbtn" id="show-add-chore">+ Add a chore</button>`;
  else{
    h+=`<div class="fbox"><input class="finput" id="nc-task" placeholder="What's the chore?"><input class="finput" id="nc-min" type="number" placeholder="Estimated minutes" min="1">
    <div class="flabel">Frequency</div><div class="pills" id="nc-freq">${FREQS.map(f=>`<button class="pill" data-fr="${f}">${f}</button>`).join("")}</div>
    <div class="flabel">Scheduled Days</div><div class="pills" id="nc-days">${DAYS.map((d,i)=>`<button class="pill" data-dy="${i}">${d}</button>`).join("")}</div>
    <div style="font-size:12px;color:#999;margin-bottom:12px">Tap days. Leave empty for flexible.</div>
    <div class="flabel">Area</div><div class="pills" id="nc-zone">${ZO.map(z=>`<button class="pill" data-zo="${z}">${ZC[z].icon} ${ZC[z].label}</button>`).join("")}</div>
    <div style="display:flex;gap:8px"><button class="btnp" style="flex:1" id="do-add-chore">Add</button><button class="btns" id="cancel-add-chore">Cancel</button></div></div>`;
  }
  h+=`</div>`;

  // ─── CATCH UP (missed from earlier this week) ───
  if(missed.length>0){
    h+=`<div class="catchup-bar" id="catchup-toggle">
      <div><div class="cb-label">${missed.length} item${missed.length>1?"s":""} to catch up on</div>
      <div class="cb-sub">From earlier this week</div></div>
      <div class="cb-arrow ${showCatchUp?"open":""}">›</div>
    </div>`;
    if(showCatchUp){
      h+=`<div style="margin-bottom:16px">`;
      h+=`<div style="display:flex;gap:8px;margin-bottom:8px">
        <button class="sec-btn" id="bulk-complete-missed">✓ Complete all</button>
        <button class="sec-btn" id="bulk-skip-missed">→ Skip all</button>
      </div>`;
      missed.forEach(c=>{h+=choreCard(c,false,true,c.missedDay)});
      h+=`</div>`;
    }
  }

  // ─── TODAY'S CHORES ───
  if(todayPending.length>0){
    h+=`<div class="sec"><div class="sec-label">📋 Today</div><div class="sec-count" style="background:#e3f2fd;color:#1565c0">${todayPending.length} to do</div></div>`;
    if(todayPending.length>2){
      h+=`<div style="display:flex;gap:8px;margin-bottom:8px">
        <button class="sec-btn" id="bulk-complete-today">✓ Complete all</button>
      </div>`;
    }
    todayPending.forEach(c=>{h+=choreCard(c,false,false)});
  } else if(totalToday>0){
    h+=`<div style="text-align:center;padding:24px 0;color:#4a7c59;font-size:16px;font-weight:500">🎉 All done for today!</div>`;
  } else {
    h+=`<div style="text-align:center;padding:24px 0;color:#888;font-size:15px">No chores scheduled for today</div>`;
  }

  // ─── DONE TODAY ───
  if(todayDone.length>0){
    h+=`<div class="sec" style="margin-top:12px"><div class="sec-label" style="color:#4a7c59">✓ Done</div></div>`;
    todayDone.forEach(c=>{h+=choreCard(c,true,false)});
  }

  // ─── WEEK OVERVIEW (tappable) ───
  h+=`<div style="margin-top:20px"><div class="sec"><div class="sec-label" style="color:#888">This Week</div>
  ${peekDay!==null?`<button class="sec-btn" id="close-peek">Close</button>`:""}</div></div>`;
  h+=`<div class="week-grid">`;
  for(let d=0;d<7;d++){
    const isToday=d===today;

    h+=`<div style="margin-bottom:16px">`;

    if(peekSched.length===0){
      h+=`<div style="text-align:center;padding:20px 0;color:#bbb;font-size:15px">Nothing scheduled</div>`;
    } else {
      peekSched.forEach(c=>{
        const done=isDoneForDate(c,peekDate);
        // For future days, show as preview (no actions)
        if(isFuture){
          h+=`<div class="tc" style="opacity:.7">
            <div class="tc-chk" style="border-color:#ddd;width:34px;height:34px"></div>
            <div class="tc-body">
              <div class="tc-top"><div class="tc-name">${esc(c.task)}</div></div>
              <div class="tc-meta"><span style="color:#aaa">~${c.minutes}m</span><span class="tc-badge">${c.frequency}</span><span style="color:#bbb">upcoming</span></div>
            </div>
          </div>`;
        } else {
          h+=choreCard(c,done,false);
        }
      });
    }
    h+=`</div>`;
  }

  document.getElementById("tab-chores").innerHTML=h;

  // ─── EVENTS ───
  document.getElementById("catchup-toggle")?.addEventListener("click",()=>{showCatchUp=!showCatchUp;renderChores()});
  document.querySelectorAll("[data-cid]").forEach(b=>b.addEventListener("click",()=>{
    const id=b.dataset.cid;
    const c=chores.find(x=>x.id===id);if(!c)return;
    // Toggle: if done for today/this period, undo last completion
    if(isDoneForDate(c,ts)){
      const arr=choreLog[id]||[];arr.pop();choreLog[id]=arr;
    } else {
      if(!choreLog[id])choreLog[id]=[];
      choreLog[id].push(new Date().toISOString());
    }
    saveCL();renderChores();
  }));
  document.querySelectorAll("[data-skip]").forEach(b=>b.addEventListener("click",()=>{
    choreSkips[b.dataset.skip]=new Date().toISOString();saveCL();renderChores();
  }));
  document.querySelectorAll("[data-cedit]").forEach(b=>b.addEventListener("click",e=>{
    e.stopPropagation();const item=chores.find(c=>c.id===b.dataset.cedit);if(item)showEditModal("chore",item);
  }));
  document.getElementById("bulk-complete-missed")?.addEventListener("click",()=>{
    const now=new Date().toISOString();missed.forEach(c=>{if(!choreLog[c.id])choreLog[c.id]=[];choreLog[c.id].push(now)});saveCL();renderChores();
  });
  document.getElementById("bulk-skip-missed")?.addEventListener("click",()=>{
    const now=new Date().toISOString();missed.forEach(c=>{choreSkips[c.id]=now});saveCL();renderChores();
  });
  document.getElementById("bulk-complete-today")?.addEventListener("click",()=>{
    const now=new Date().toISOString();todayPending.forEach(c=>{if(!choreLog[c.id])choreLog[c.id]=[];choreLog[c.id].push(now)});saveCL();renderChores();
  });
  document.getElementById("show-add-chore")?.addEventListener("click",()=>{showForm.chore=true;renderChores()});
  document.getElementById("cancel-add-chore")?.addEventListener("click",()=>{showForm.chore=false;renderChores()});
  // Peek day
  document.querySelectorAll("[data-peek]").forEach(b=>b.addEventListener("click",()=>{
    const d=parseInt(b.dataset.peek);peekDay=peekDay===d?null:d;renderChores();
  }));
  document.getElementById("close-peek")?.addEventListener("click",()=>{peekDay=null;renderChores()});
  document.getElementById("cancel-add-chore")?.addEventListener("click",()=>{showForm.chore=false;renderChores()});

  const filtered=projects.filter(p=>{if(projFilter==="all")return!p.done;if(projFilter==="done")return p.done;if(projFilter==="high")return!p.done&&p.priority==="high";return!p.done&&p.category===projFilter});
  const hc=projects.filter(p=>!p.done&&p.priority==="high").length;
  let h=`<div style="margin:16px 0 12px">`;if(!showForm.proj)h+=`<button class="addbtn" id="show-add-proj">+ Add a project</button>`;
  else{h+=`<div class="fbox"><input class="finput" id="np-task" placeholder="What needs to be done?"><input class="finput" id="np-cost" placeholder="Cost (optional)"><div class="flabel">Category</div><div class="pills" id="np-cat">${CATS.map(c=>`<button class="pill" data-ca="${c.key}">${c.icon} ${c.label}</button>`).join("")}</div><div class="flabel">Priority</div><div class="pills" id="np-pri">${PRIORITIES.map(p=>`<button class="pill" data-pr="${p}" style="color:${PC[p].color}">${PC[p].label}</button>`).join("")}</div><div style="display:flex;gap:8px"><button class="btnp" style="flex:1" id="do-add-proj">Add</button><button class="btns" id="cancel-add-proj">Cancel</button></div></div>`}h+=`</div>`;
  const filters=[{key:"all",label:"To Do"},{key:"high",label:"🔴 High"},{key:"repair",label:"🔨 Repair"},{key:"upgrade",label:"⬆️ Upgrade"},{key:"yard",label:"🌿 Yard"},{key:"done",label:"✓ Done"}];
  h+=`<div class="fpills">${filters.map(f=>`<button class="fpill ${projFilter===f.key?"on":""}" data-pf="${f.key}">${f.label}</button>`).join("")}</div>`;
  h+=`<div style="font-size:14px;color:#999;margin-bottom:10px">${filtered.length} ${projFilter==="done"?"completed":"project"}${filtered.length!==1?"s":""}${projFilter==="all"&&hc>0?` <span style="color:#e65100">· ${hc} high priority</span>`:""}</div>`;
  if(!filtered.length)h+=`<div class="empty">${projFilter==="done"?"Nothing completed yet":"No projects — tap + to add one"}</div>`;
  filtered.forEach(p=>{const cat=CATS.find(c=>c.key===p.category)||CATS[5],pc=PC[p.priority];
    h+=`<div class="pcard ${p.done?"pdn":""}"><button class="pchk ${p.done?"on":""}" data-ptog="${p.id}">${p.done?"✓":""}</button><div style="flex:1"><div style="font-size:16px;font-weight:500;${p.done?"text-decoration:line-through;color:#999":""}">${esc(p.task)}</div><div style="display:flex;gap:8px;margin-top:7px;flex-wrap:wrap;align-items:center"><span class="tg">${cat.icon} ${cat.label}</span><span style="font-size:13px;background:${pc.bg};padding:3px 10px;border-radius:5px;color:${pc.color};font-weight:600">${pc.label}</span>${p.cost?`<span style="font-size:13px;color:#888">${esc(p.cost)}</span>`:""}<span style="font-size:13px;color:#bbb">Added ${fmtDate(p.added)}</span></div>${p.done&&p.doneDate?`<div style="font-size:13px;color:#aaa;margin-top:4px">Completed ${fmtDate(p.doneDate)}</div>`:""}${!p.done?`<div class="actions"><button class="act" data-pedit="${p.id}">edit</button></div>`:""}</div></div>`});
  document.getElementById("tab-projects").innerHTML=h;
  document.getElementById("show-add-proj")?.addEventListener("click",()=>{showForm.proj=true;renderProjects()});
  document.getElementById("cancel-add-proj")?.addEventListener("click",()=>{showForm.proj=false;renderProjects()});
  if(showForm.proj){pillSelect("np-cat","ca","repair");pillSelect("np-pri","pr","medium")}
  document.getElementById("do-add-proj")?.addEventListener("click",()=>{const task=document.getElementById("np-task")?.value.trim();if(!task)return;projects.unshift({id:"p-"+uid(),task,priority:getSelected("np-pri","pr","medium"),cost:document.getElementById("np-cost")?.value.trim()||"",category:getSelected("np-cat","ca","repair"),added:new Date().toISOString(),done:false,doneDate:null});saveProjects();showForm.proj=false;renderProjects()});
  document.querySelectorAll("[data-pf]").forEach(b=>b.addEventListener("click",()=>{projFilter=b.dataset.pf;renderProjects()}));
  document.querySelectorAll("[data-ptog]").forEach(b=>b.addEventListener("click",()=>{const p=projects.find(x=>x.id===b.dataset.ptog);if(p){p.done=!p.done;p.doneDate=p.done?new Date().toISOString():null}saveProjects();renderProjects()}));
  document.querySelectorAll("[data-pedit]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();const item=projects.find(p=>p.id===b.dataset.pedit);if(item)showEditModal("project",item)}));
}

render();
</script>

</body>
</html>
